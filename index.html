<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haier A01 - WOR MAP & OT System</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Hide Scrollbar for Nav */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Factory Map Styles */
        .conveyor-belt {
            background: #1e293b;
            height: 35px;
            position: relative;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 80px);
            border-top: 2px solid #334155;
            border-bottom: 2px solid #0f172a;
        }
        
        .map-card {
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        @keyframes pulse-emerald {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        .status-dot { animation: pulse-emerald 2s infinite; }
        
        /* Animation for Conveyor Belt */
        @keyframes belt-bg-slide {
            0% { background-position: 0 0, 10px 10px; }
            100% { background-position: 40px 0, 50px 10px; }
        }
        .conveyor-bg-animate {
            animation: belt-bg-slide 1.5s linear infinite;
        }
        @keyframes items-slide-right {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0%); }
        }
        .animate-conveyor-items {
            width: 200%;
            animation: items-slide-right 12s linear infinite;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* Print Styles (Export PDF) */
        @media print {
            body { background-color: #ffffff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .print-hidden { display: none !important; }
            .glass-nav, footer { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; background: white !important; }
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl, .shadow-2xl { box-shadow: none !important; }
            .map-card, .bg-white { border: 1px solid #e2e8f0 !important; }
            @page { size: landscape; margin: 10mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ============================================================================
        // [ ตั้งค่าความปลอดภัย หน้า OT ]
        // ============================================================================
        const OT_ACCESS_PASSWORD = "admina01";

        // ============================================================================
        // [ Helper Functions แก้ไข ReferenceError ]
        // ============================================================================
        const getOriginalLocalDateString = () => {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        };

        // ============================================================================
        // [ ฟังก์ชันตรวจสอบเวลาและกำหนดสถานะการเข้างานจากการสแกนหน้า ]
        // ============================================================================
        const checkScanTimeStatus = (dateObj = new Date()) => {
            const h = dateObj.getHours();
            const m = dateObj.getMinutes();
            const s = dateObj.getSeconds();
            
            // แปลงเวลาให้เป็นวินาทีรวมทั้งหมดใน 1 วัน เพื่อง่ายต่อการตรวจสอบช่วงเวลา
            const timeInSeconds = (h * 3600) + (m * 60) + s;

            if (timeInSeconds >= 18000 && timeInSeconds <= 28800) {
                // 05:00:00 ถึง 08:00:00 (18000 ถึง 28800 วินาที)
                return "Present Day (กะเช้า มาปกติ)";
            } else if (timeInSeconds >= 28801 && timeInSeconds <= 61199) {
                // 08:00:01 ถึง 16:59:59 (28801 ถึง 61199 วินาที)
                return "Late Day (กะเช้า มาสาย)";
            } else if (timeInSeconds >= 61200 && timeInSeconds <= 72000) {
                // 17:00:00 ถึง 20:00:00 (61200 ถึง 72000 วินาที)
                return "Present Night (กะดึก มาปกติ)";
            } else {
                // 20:00:01 ถึง 04:59:59 (เวลาอื่นๆ ที่เหลือในวันใหม่)
                return "Late Night (กะดึก มาสาย)";
            }
        };

        // ============================================================================
        // [ ฟังก์ชันบันทึกและอ่านข้อมูลเมื่อสแกนหน้าเสร็จ ]
        // ============================================================================
        const saveFaceScanData = async (employeeId, scanDate = new Date()) => {
            const statusResult = checkScanTimeStatus(scanDate);
            const timeStr = scanDate.toLocaleTimeString('th-TH', { hour12: false });
            const dateStr = getOriginalLocalDateString();

            const payload = {
                action: 'SAVE_SCAN',
                id: employeeId,
                date: dateStr,
                time: timeStr,
                status: statusResult
            };

            console.log(`บันทึกการสแกนหน้า: รหัส ${employeeId} เวลา ${timeStr} ➡️ ${statusResult}`);
            // await fetch("YOUR_API_URL", { method: 'POST', body: JSON.stringify(payload) });
            return { success: true, message: statusResult, data: payload };
        };

        const readFaceScanData = async (employeeId) => {
            console.log(`อ่านข้อมูลการสแกนหน้าของ: ${employeeId}`);
            const mockDate = new Date();
            const statusResult = checkScanTimeStatus(mockDate);
            return { success: true, id: employeeId, displayMessage: statusResult };
        };

        // ============================================================================
        // [ ระบบดึงข้อมูลอัจฉริยะ Multi-Proxy Fallback แก้อาการ Failed to fetch ]
        // ============================================================================
        const fetchWithFallback = async (url) => {
            const proxyList = [
                url, // 1. ลองดึงโดยตรงก่อน
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, // 2. สำรองด้วย AllOrigins
                `https://corsproxy.io/?${encodeURIComponent(url)}` // 3. สำรองด้วย CorsProxy
            ];

            let lastError;
            for (let i = 0; i < proxyList.length; i++) {
                try {
                    const response = await fetch(proxyList[i]);
                    const text = await response.text();
                    if (text.includes("<!DOCTYPE html>")) throw new Error("Google Sheet requires login (Not published to web)");
                    return text;
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error("Failed to fetch data from all sources");
        };

        // ============================================================================
        // [ ส่วนของระบบ Dashboard และ Attendance ]
        // ============================================================================
        const STATUS_LEGEND = [
            { label: 'มาปกติ', color: 'text-emerald-500', bg: 'bg-[#22c55e]' },
            { label: 'สาย', color: 'text-orange-500', bg: 'bg-[#f97316]' },
            { label: 'ลาป่วย', color: 'text-slate-400', bg: 'bg-[#94a3b8]' },
            { label: 'ลากิจ', color: 'text-fuchsia-500', bg: 'bg-[#d946ef]' },
            { label: 'ลาพักร้อน', color: 'text-purple-500', bg: 'bg-[#a855f7]' }, // เพิ่มลาพักร้อน
            { label: 'ลาอื่นๆ', color: 'text-blue-500', bg: 'bg-[#3b82f6]' },
            { label: 'ขาดงาน', color: 'text-red-500', bg: 'bg-[#ef4444]' },
            { label: 'ลาออก', color: 'text-slate-800', bg: 'bg-[#1e293b]' },
            { label: 'ไม่มีข้อมูล', color: 'text-slate-400', bg: 'bg-slate-200' } // เพิ่มเพื่อใช้ในหน้าต่าง Modal
        ];

        const SECTIONS = [
            { id: 'front', name: 'หัวไลน์', sub: '前装-Input', keywords: ['input', '前装', 'หัวไลน์'] },
            { id: 'middle', name: 'กลางไลน์', sub: '装配-Middle', keywords: ['middle', '装配', 'กลางไลน์'] },
            { id: 'test', name: 'ห้องทดสอบ', sub: '测试房-Cooling', keywords: ['cooling', '测试房', 'ทดสอบ', 'test'] },
            { id: 'final', name: 'ท้ายไลน์', sub: '后装-Final', keywords: ['final', '后装', 'ท้ายไลน์'] }
        ];

        const PersonMapIcon = ({ employee, groupName }) => {
            const status = employee?.status || 'ไม่มีข้อมูล';
            const config = STATUS_LEGEND.find(l => status.includes(l.label)) || { bg: 'bg-slate-200' };
            const roleName = groupName || employee?.role || employee?.group || 'EMPLOYEE';
            
            const getKeyIcon = (val) => {
                if (!val) return null;
                const v = val.toLowerCase();
                if (v.includes('เชื่อม') || v.includes('welding')) return { icon: 'fa-fire', color: 'bg-orange-600', label: 'Welding' };
                if (v.includes('pcb')) return { icon: 'fa-microchip', color: 'bg-cyan-500', label: 'PCB' };
                if (v.includes('แวคคัม') || v.includes('vacuum') || v.includes('เติมสาร')) return { icon: 'fa-gauge-high', color: 'bg-blue-500', label: 'Vacuum' };
                if (v.includes('ทดสอบ') || v.includes('test')) return { icon: 'fa-flask-vial', color: 'bg-purple-500', label: 'Testing' };
                if (v.includes('เครื่องจักร') || v.includes('machine')) return { icon: 'fa-gears', color: 'bg-slate-600', label: 'Machine' };
                if (v.includes('pinching') || v.includes('ปิดผนึก')) return { icon: 'fa-snowflake', color: 'bg-indigo-500', label: 'Pinching (ปิดระบบ)' };
                if (v.includes('new')) return { isEmoji: '🐣', color: 'bg-yellow-100', label: 'New Employee' };
                if (['y', '1', 'yes', 'true'].includes(v)) return { icon: 'fa-star', color: 'bg-yellow-400', label: 'Key Position' };
                return null;
            };

            const keyData = getKeyIcon(employee?.isKey);
            
            return (
                <div className="relative group m-[1px]">
                    <div className={`w-[22px] h-[22px] rounded-md ${config.bg} flex items-center justify-center shadow-sm cursor-pointer relative`}>
                        <i className="fa-solid fa-user text-white text-[11px]"></i>
                        {keyData && (
                            <div className={`absolute -top-2 -right-2 w-[17px] h-[17px] ${keyData.color} rounded-full flex items-center justify-center shadow-md border border-white z-10 overflow-hidden`}>
                                {keyData.isEmoji ? (
                                    <span className="text-[11px] leading-none">{keyData.isEmoji}</span>
                                ) : (
                                    <i className={`fa-solid ${keyData.icon} text-white text-[9px]`}></i>
                                )}
                            </div>
                        )}
                    </div>
                    <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:flex flex-col items-center z-50 pointer-events-none">
                        <div className="bg-[#0f172a] text-white text-center px-4 py-2 rounded-xl shadow-xl min-w-[130px] border border-slate-700">
                            <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">
                                {keyData && (keyData.isEmoji || <i className={`fa-solid ${keyData.icon} text-yellow-400 mr-1`}></i>)}
                                {roleName}
                            </p>
                            <p className="text-[13px] font-bold whitespace-nowrap">{employee?.name || 'ไม่ระบุชื่อ'}</p>
                            <div className="flex items-center justify-center gap-1.5 mt-1.5">
                                <div className={`w-1.5 h-1.5 rounded-full ${config.bg}`}></div>
                                <p className="text-[10px] text-slate-300">{status}</p>
                            </div>
                            {keyData && keyData.label && (
                                <div className="mt-1 pt-1 border-t border-slate-700">
                                    <span className="text-[8px] text-slate-400 uppercase font-bold tracking-tighter">Skill: {keyData.label}</span>
                                </div>
                            )}
                        </div>
                        <div className="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[6px] border-t-[#0f172a]"></div>
                    </div>
                </div>
            );
        };

        const CustomDashboardDatePicker = ({ rawDate, setRawDate, availableDates }) => {
            const [isOpen, setIsOpen] = React.useState(false);
            const [viewDate, setViewDate] = React.useState(new Date(rawDate));
            const ref = React.useRef(null);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (ref.current && !ref.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            React.useEffect(() => { setViewDate(new Date(rawDate)); }, [rawDate]);

            const displayDateStr = () => {
                if(!rawDate) return "";
                const parts = rawDate.split('-');
                if(parts.length !== 3) return rawDate;
                return `${parts[2]}/${parts[1]}/${parts[0]}`;
            };

            const handleSelectDate = (d, m, y) => {
                const newDate = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                setRawDate(newDate);
                setIsOpen(false);
            };

            const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const daysOfWeek = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const changeMonth = (offset) => { setViewDate(new Date(year, month + offset, 1)); };

            const setToday = () => {
                const today = new Date();
                const newDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                setRawDate(newDate);
                setViewDate(today);
                setIsOpen(false);
            };

            const renderDays = () => {
                const days = [];
                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="w-8 h-8"></div>);
                }
                for (let d = 1; d <= daysInMonth; d++) {
                    const checkDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const isSelected = rawDate === checkDate;
                    const hasData = availableDates.has(checkDate);

                    days.push(
                        <div key={d} className="relative w-8 h-8 flex items-center justify-center mb-2">
                            <button 
                                onClick={(e) => { e.stopPropagation(); handleSelectDate(d, month + 1, year); }}
                                className={`w-8 h-8 rounded-full flex items-center justify-center text-[13px] font-bold transition-all ${isSelected ? 'bg-[#2563eb] text-white shadow-md' : 'text-slate-700 hover:bg-slate-100'}`}
                            >
                                {d}
                            </button>
                            {hasData && !isSelected && <div className="absolute -bottom-1 w-1 h-1 bg-emerald-500 rounded-full"></div>}
                            {hasData && isSelected && <div className="absolute -bottom-1 w-1 h-1 bg-white/80 rounded-full"></div>}
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="relative" ref={ref}>
                    <div 
                        onClick={() => setIsOpen(!isOpen)}
                        className="relative bg-[#f8fafc] border border-slate-200 px-6 py-2.5 rounded-full shadow-sm flex items-center justify-center gap-4 cursor-pointer hover:bg-slate-100 transition-colors"
                    >
                        <i className="fa-regular fa-calendar text-[#ea580c] text-[22px]"></i>
                        <span className="text-[20px] font-black text-[#0369a1] tracking-wide">{displayDateStr()}</span>
                        <i className="fa-regular fa-calendar-days text-slate-800 text-[15px]"></i>
                    </div>

                    {isOpen && (
                        <div className="absolute top-full mt-3 left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:right-0 w-[290px] bg-white rounded-3xl shadow-[0_15px_40px_-10px_rgba(0,0,0,0.2)] border border-slate-100 p-5 z-[100] animate-in fade-in zoom-in-95 duration-200">
                            <div className="flex items-center justify-between mb-4 px-2">
                                <button onClick={(e) => { e.stopPropagation(); changeMonth(-1); }} className="text-slate-400 hover:text-blue-600 transition-colors w-6 h-6 flex items-center justify-center"><i className="fa-solid fa-chevron-left text-sm"></i></button>
                                <div className="text-center leading-tight">
                                    <p className="text-[15px] font-black text-slate-800">{thaiMonths[month]}</p>
                                    <p className="text-[11px] font-bold text-slate-400 mt-0.5">{year}</p>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); changeMonth(1); }} className="text-slate-400 hover:text-blue-600 transition-colors w-6 h-6 flex items-center justify-center"><i className="fa-solid fa-chevron-right text-sm"></i></button>
                            </div>

                            <div className="grid grid-cols-7 mb-3 text-center">
                                {daysOfWeek.map(d => (
                                    <div key={d} className="text-[11px] font-black text-slate-300">{d}</div>
                                ))}
                            </div>

                            <div className="grid grid-cols-7 place-items-center gap-y-1">
                                {renderDays()}
                            </div>

                            <div className="mt-2 pt-4 border-t border-slate-50 flex items-center justify-between px-2">
                                <div className="flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                                    <span className="text-[10px] font-bold text-slate-400">มีข้อมูลในชีต</span>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); setToday(); }} className="text-[11px] font-black text-[#2563eb] hover:text-blue-800 transition-colors">วันนี้</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SummaryDashboard = ({ filteredEmps: baseFilteredEmps, employees, rawDate, availableDates, activeShift, STATUS_LEGEND }) => {
            const [dashLine, setDashLine] = useState('ALL');
            
            const filteredEmps = useMemo(() => {
                if (dashLine === 'ALL') return baseFilteredEmps;
                const lineNum = dashLine.replace('LINE ', '');
                return baseFilteredEmps.filter(e => (e.line || '').toString().toUpperCase().includes(lineNum.toUpperCase()));
            }, [baseFilteredEmps, dashLine]);

            const totalEmps = filteredEmps.length;
            
            const getHexColor = (bgClass) => {
                const match = bgClass.match(/#([0-9a-fA-F]{6})/);
                return match ? match[0] : '#cbd5e1';
            };
            
            let currentGradientPercent = 0;
            const pieData = STATUS_LEGEND.map(legend => {
                const count = filteredEmps.filter(e => (e.status || 'ไม่มีข้อมูล').includes(legend.label)).length;
                const percent = totalEmps > 0 ? (count / totalEmps) * 100 : 0;
                const hexColor = getHexColor(legend.bg);
                const gradientString = `${hexColor} ${currentGradientPercent}% ${currentGradientPercent + percent}%`;
                currentGradientPercent += percent;
                return { ...legend, count, percent, hexColor, gradientString };
            }).filter(d => d.count > 0);

            const conicGradientStr = `conic-gradient(${pieData.map(d => d.gradientString).join(', ')})`;
            
            const sortedPie = [...pieData].sort((a,b) => b.count - a.count);
            const topPie = sortedPie.length > 0 ? sortedPie[0] : null;
            const secondPie = sortedPie.length > 1 ? sortedPie[1] : null;

            const ORIGINAL_LINES = [1, 2, 3, 4, 5];
            const barData = ORIGINAL_LINES.map(lineNum => {
                const lineEmps = baseFilteredEmps.filter(e => (e.line || '').toString().includes(lineNum.toString()));
                const total = lineEmps.length;
                const present = lineEmps.filter(e => e.status === 'มาปกติ' || e.status === 'สาย').length;
                const percent = total > 0 ? (present/total)*100 : 0;
                return { name: `Line ${lineNum}`, total, present, percent };
            });

            const validBars = barData.filter(b => b.total > 0);
            const sortedBars = [...validBars].sort((a,b) => b.percent - a.percent);
            const topBar = sortedBars.length > 0 ? sortedBars[0] : null;
            const bottomBar = sortedBars.length > 0 ? sortedBars[sortedBars.length - 1] : null;

            const sortedDates = Array.from(availableDates).sort((a,b) => new Date(a) - new Date(b));
            const currentIdx = sortedDates.indexOf(rawDate);
            const trendDates = currentIdx !== -1 
                ? sortedDates.slice(Math.max(0, currentIdx - 6), currentIdx + 1)
                : sortedDates.slice(-7);
            
            const lineNumFilter = dashLine.replace('LINE ', '');
            const trendData = trendDates.map(date => {
                const dayEmps = employees.filter(e => {
                    if (e.resignedDate && new Date(date) > new Date(e.resignedDate)) return false;
                    if (e.shift !== activeShift) return false;
                    if (dashLine !== 'ALL' && !(e.line || '').toString().toUpperCase().includes(lineNumFilter.toUpperCase())) return false;
                    return true;
                });
                const pres = dayEmps.filter(e => {
                    const s = e.statusesByDate?.[date] || 'ไม่มีข้อมูล';
                    return s === 'มาปกติ' || s === 'สาย';
                }).length;

                const resigns = employees.filter(e => {
                    if (e.shift !== activeShift) return false;
                    if (dashLine !== 'ALL' && !(e.line || '').toString().toUpperCase().includes(lineNumFilter.toUpperCase())) return false;
                    return e.statusesByDate?.[date] === 'ลาออก' || e.resignedDate === date;
                }).length;

                const tot = dayEmps.length;
                const rate = tot > 0 ? (pres/tot)*100 : 0;
                const displayDate = new Date(date).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                return { date, displayDate, rate, present: pres, total: tot, resigns };
            });

            const maxRate = 100;
            const minRate = Math.max(0, Math.min(...trendData.map(d => d.rate)) - 10);
            const getX = (index) => (index / (Math.max(1, trendData.length - 1))) * 180;
            const getY = (val) => 100 - ((val - minRate) / (maxRate - minRate || 1)) * 100;
            const polylinePoints = trendData.map((d, i) => `${getX(i)},${getY(d.rate)}`).join(' ');
            const areaPoints = trendData.length > 0 ? `0,100 ${polylinePoints} 180,100` : '';

            const maxResign = Math.max(5, ...trendData.map(d => d.resigns));
            const getResignY = (val) => 100 - (val / maxResign) * 80;
            const resignPolylinePoints = trendData.map((d, i) => `${getX(i)},${getResignY(d.resigns)}`).join(' ');
            const resignAreaPoints = trendData.length > 0 ? `0,100 ${resignPolylinePoints} 180,100` : '';

            const validTrendData = trendData.filter(d => d.rate > 0);
            const avgRate = validTrendData.length > 0 ? validTrendData.reduce((acc, curr) => acc + curr.rate, 0) / validTrendData.length : 0;
            const latestRate = validTrendData.length > 0 ? validTrendData[validTrendData.length - 1].rate : 0;
            const prevRate = validTrendData.length > 1 ? validTrendData[validTrendData.length - 2].rate : latestRate;
            const trendDiff = latestRate - prevRate;
            
            let trendText = "คงที่เมื่อเทียบกับวันทำงานก่อนหน้า";
            let trendColor = "text-slate-500";
            let trendIcon = "fa-minus text-slate-400";
            if (trendDiff > 0) { 
                trendText = `เพิ่มขึ้น ${trendDiff.toFixed(1)}% จากวันทำงานก่อนหน้า`; 
                trendColor = "text-emerald-600"; 
                trendIcon = "fa-arrow-trend-up text-emerald-500"; 
            } else if (trendDiff < 0) { 
                trendText = `ลดลง ${Math.abs(trendDiff).toFixed(1)}% จากวันทำงานก่อนหน้า`; 
                trendColor = "text-rose-600"; 
                trendIcon = "fa-arrow-trend-down text-rose-500"; 
            }

            const totalResign7Days = trendData.reduce((acc, curr) => acc + curr.resigns, 0);
            let resignTrendText = totalResign7Days > 0 
                ? <>มีพนักงานลาออกรวม <span className="text-rose-600 font-black bg-white px-1.5 py-0.5 rounded shadow-sm">{totalResign7Days} คน</span> ในช่วง 7 วันที่ผ่านมา</> 
                : "ไม่มีพนักงานลาออกในรอบ 7 วันที่ผ่านมา ถือเป็นสัญญาณที่ดี";

                <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 w-full mb-8">

                            ))}

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">

                                    สัดส่วนสถานะการทำงาน

                                    <div className="absolute inset-0 m-auto w-[140px] h-[140px] bg-white rounded-full flex items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.08)] border-[5px] border-white/50 backdrop-blur-sm">
                                        <div className="text-center">

                                <div className="w-full mt-10 grid grid-cols-2 gap-x-3 gap-y-4 px-2">
                                    {pieData.map((d, i) => (
                                        <div key={i} className="flex items-center gap-2 text-[12px] font-bold text-slate-600 bg-slate-50/80 px-3 py-2.5 rounded-xl border border-slate-100/50 hover:bg-slate-100 transition-colors">

                                        <div className="border-t border-dashed border-slate-300 w-full"></div>

                                    {barData.map((d, i) => (

                                            <span className="text-[12px] font-black text-emerald-600 bg-emerald-50/50 shadow-sm border border-emerald-100/50 px-3 py-1 rounded-lg">{d.percent.toFixed(0)}%</span>
                                        </div>

                            <div className="w-full mt-8 bg-emerald-50/50 rounded-2xl p-5 border border-emerald-100/50 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-20 h-20 bg-emerald-500 opacity-5 rounded-bl-[100%] pointer-events-none"></div>

                                </h4>

                                    {topBar && bottomBar ? (

                        <div className="bg-white border border-slate-100 p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] transition-all duration-300 flex flex-col justify-between h-full">
                            <div className="w-full flex-1 flex flex-col">
                                <h3 className="text-[14px] font-black text-slate-800 uppercase tracking-widest mb-1 w-full text-left flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-xl bg-orange-50 text-orange-500 flex items-center justify-center shadow-sm"><i className="fa-solid fa-chart-area text-sm"></i></div> 
                                    แนวโน้ม 7 วันย้อนหลัง
                                </h3>
                                <p className="text-[11px] font-bold text-slate-400 mb-6 tracking-wide ml-11">อัตราการมาทำงาน (%) อ้างอิงเฉพาะกะ <span className="font-black text-orange-500 bg-orange-50 px-2 py-0.5 rounded-md ml-1">{activeShift}</span> ไลน์ <span className="font-black text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md ml-1">{dashLine}</span></p>
                                
                                <div className="flex-1 w-full relative mt-4 h-[180px]">
                                    <svg viewBox="-10 -15 200 145" className="w-full h-full overflow-visible">
                                        <defs>
                                            <linearGradient id="trendGradient" x1="0" x2="0" y1="0" y2="1">
                                                <stop offset="0%" stopColor="#f97316" stopOpacity="0.3"/>
                                                <stop offset="100%" stopColor="#f97316" stopOpacity="0.0"/>
                                            </linearGradient>
                                        </defs>
                                        <line x1="0" y1="0" x2="180" y2="0" stroke="#cbd5e1" strokeDasharray="3" strokeWidth="0.5" />
                                        <line x1="0" y1="50" x2="180" y2="50" stroke="#cbd5e1" strokeDasharray="3" strokeWidth="0.5" />
                                        <line x1="0" y1="100" x2="180" y2="100" stroke="#94a3b8" strokeWidth="1" />
                                        
                                        {areaPoints && <polygon points={areaPoints} fill="url(#trendGradient)" />}
                                        <polyline fill="none" stroke="#f97316" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" points={polylinePoints} style={{ filter: 'drop-shadow(0px 4px 6px rgba(249, 115, 22, 0.2))' }} />
                                        
                                        {trendData.map((d, i) => (
                                            <g key={i} className="group cursor-pointer">
                                                <circle cx={getX(i)} cy={getY(d.rate)} r="4" fill="#ffffff" stroke="#f97316" strokeWidth="2.5" className="transition-all duration-300 group-hover:r-[6px] shadow-xl" />
                                                <rect x={getX(i)-16} y={getY(d.rate)-24} width="32" height="18" rx="4" fill="#0f172a" className="opacity-0 group-hover:opacity-100 transition-opacity shadow-lg" />
                                                <text x={getX(i)} y={getY(d.rate) - 15} fontSize="5.5" textAnchor="middle" fill="#0f172a" className="opacity-100 group-hover:fill-white transition-colors" fontWeight="900">{d.rate.toFixed(1)}%</text>
                                                <text x={getX(i)} y={getY(d.rate) - 8} fontSize="4" textAnchor="middle" fill="#64748b" className="opacity-100 group-hover:fill-slate-300 transition-colors" fontWeight="bold">({d.present}/{d.total})</text>
                                                <text x={getX(i)} y="120" fontSize="5" textAnchor="middle" fill="#64748b" fontWeight="bold">{d.displayDate}</text>
                                            </g>
                                        ))}
                                    </svg>
                                </div>
                            </div>
                            <div className="w-full mt-8 bg-orange-50/50 rounded-2xl p-5 border border-orange-100/50 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-20 h-20 bg-orange-500 opacity-5 rounded-bl-[100%] pointer-events-none"></div>
                                <h4 className="text-[12px] font-black text-orange-800 uppercase flex items-center gap-1.5 mb-2.5">
                                    <i className="fa-solid fa-chart-line text-amber-500"></i> สรุปแนวโน้ม
                                </h4>
                                <p className="text-[13px] font-bold text-slate-600 leading-relaxed">
                                    อัตราเฉลี่ย 7 วันล่าสุดอยู่ที่ <span className="text-slate-800 font-black bg-white px-1.5 py-0.5 rounded shadow-sm">{avgRate.toFixed(1)}%</span> โดยวันนี้มีแนวโน้ม <span className={`font-black ${trendColor}`}><i className={`fa-solid ${trendIcon} mr-1`}></i>{trendText}</span>
                                </p>
                            </div>
                        </div>

                        <div className="bg-white border border-slate-100 p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] transition-all duration-300 flex flex-col justify-between h-full">
                            <div className="w-full flex-1 flex flex-col">
                                <h3 className="text-[14px] font-black text-slate-800 uppercase tracking-widest mb-1 w-full text-left flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-xl bg-rose-50 text-rose-500 flex items-center justify-center shadow-sm"><i className="fa-solid fa-user-xmark text-sm"></i></div> 
                                    แนวโน้มคนลาออก
                                </h3>
                                <p className="text-[11px] font-bold text-slate-400 mb-6 tracking-wide ml-11">จำนวน (คน) อ้างอิงเฉพาะกะ <span className="font-black text-rose-500 bg-rose-50 px-2 py-0.5 rounded-md ml-1">{activeShift}</span> ไลน์ <span className="font-black text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md ml-1">{dashLine}</span></p>
                                
                                <div className="flex-1 w-full relative mt-4 h-[180px]">
                                    <svg viewBox="-10 -15 200 145" className="w-full h-full overflow-visible">
                                        <defs>
                                            <linearGradient id="resignGradient" x1="0" x2="0" y1="0" y2="1">
                                                <stop offset="0%" stopColor="#f43f5e" stopOpacity="0.3"/>
                                                <stop offset="100%" stopColor="#f43f5e" stopOpacity="0.0"/>
                                            </linearGradient>
                                        </defs>
                                        <line x1="0" y1="0" x2="180" y2="0" stroke="#cbd5e1" strokeDasharray="3" strokeWidth="0.5" />
                                        <line x1="0" y1="50" x2="180" y2="50" stroke="#cbd5e1" strokeDasharray="3" strokeWidth="0.5" />
                                        <line x1="0" y1="100" x2="180" y2="100" stroke="#94a3b8" strokeWidth="1" />
                                        
                                        {resignAreaPoints && <polygon points={resignAreaPoints} fill="url(#resignGradient)" />}
                                        <polyline fill="none" stroke="#f43f5e" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" points={resignPolylinePoints} style={{ filter: 'drop-shadow(0px 4px 6px rgba(244, 63, 94, 0.2))' }} />
                                        
                                        {trendData.map((d, i) => (
                                            <g key={i} className="group cursor-pointer">
                                                <circle cx={getX(i)} cy={getResignY(d.resigns)} r="4" fill="#ffffff" stroke="#f43f5e" strokeWidth="2.5" className="transition-all duration-300 group-hover:r-[6px] shadow-xl" />
                                                <rect x={getX(i)-14} y={getResignY(d.resigns)-22} width="28" height="14" rx="4" fill="#0f172a" className="opacity-0 group-hover:opacity-100 transition-opacity shadow-lg" />
                                                <text x={getX(i)} y={getResignY(d.resigns) - 12} fontSize="5.5" textAnchor="middle" fill="#0f172a" className="opacity-100 group-hover:fill-white transition-colors" fontWeight="900">{d.resigns}</text>
                                                <text x={getX(i)} y="120" fontSize="5" textAnchor="middle" fill="#64748b" fontWeight="bold">{d.displayDate}</text>
                                            </g>
                                        ))}
                                    </svg>
                                </div>
                            </div>
                            <div className="w-full mt-8 bg-rose-50/50 rounded-2xl p-5 border border-rose-100/50 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-20 h-20 bg-rose-500 opacity-5 rounded-bl-[100%] pointer-events-none"></div>
                                <h4 className="text-[12px] font-black text-rose-800 uppercase flex items-center gap-1.5 mb-2.5">
                                    <i className="fa-solid fa-user-minus text-amber-500"></i> สรุปข้อมูลลาออก
                                </h4>
                                <p className="text-[13px] font-bold text-slate-600 leading-relaxed">
                                    {resignTrendText}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ employees, selectedLine, activeShift, isSyncing }) => {
            const [rawDate, setRawDate] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            });
            const [showAbsentModal, setShowAbsentModal] = useState(false);
            const [showWarningModal, setShowWarningModal] = useState(false);

            const availableDates = useMemo(() => {
                if (!employees.length || !employees[0].statusesByDate) return new Set();
                return new Set(Object.keys(employees[0].statusesByDate));
            }, [employees]);

            useEffect(() => {
                if (availableDates.size > 0 && !availableDates.has(rawDate)) {
                    const sortedDates = Array.from(availableDates).sort((a, b) => new Date(b) - new Date(a));
                    if (sortedDates.length > 0) {
                        setRawDate(sortedDates[0]);
                    }
                }
            }, [availableDates]);

            const dynamicEmployees = useMemo(() => {
                return employees.map(e => ({
                    ...e,
                    status: e.statusesByDate?.[rawDate] || 'ไม่มีข้อมูล' 
                })).filter(e => {
                    if (e.resignedDate && new Date(rawDate) > new Date(e.resignedDate)) {
                        return false;
                    }
                    if (e.shift !== activeShift) {
                        return false;
                    }
                    return true;
                });
            }, [employees, rawDate, activeShift]);

            const lineNum = selectedLine.replace('LINE ', '');
            const filtered = dynamicEmployees.filter(e => selectedLine === 'ALL' || (e.line || '').toString().toUpperCase().includes(lineNum.toUpperCase()));
            
            const stats = {
                total: filtered.length,
                came: filtered.filter(e => e.status === 'มาปกติ' || e.status === 'สาย').length,
                normal: filtered.filter(e => e.status === 'มาปกติ').length,
                rate: filtered.length > 0 ? ((filtered.filter(e => e.status === 'มาปกติ' || e.status === 'สาย').length / filtered.length) * 100).toFixed(1) : 0
            };

            // Anomaly Alert Logic (แจ้งเตือนพนักงานขาด/ลางานผิดปกติ เกิน 10%)
            const absentCount = filtered.filter(e => ['ขาดงาน', 'ลาป่วย', 'ลากิจ', 'ลาพักร้อน', 'ลาอื่นๆ'].includes(e.status)).length;
            const absentRate = stats.total > 0 ? (absentCount / stats.total) * 100 : 0;
            const isAnomaly = absentRate >= 10;

            // กรองพนักงานที่ "ไม่ได้มาทำงาน" (เพื่อแสดงใน Modal)
            const nonPresentEmployees = filtered.filter(e => !['มาปกติ', 'สาย', 'ลาออก'].includes(e.status));
            
            // สรุปยอดตามสถานะที่ไม่ได้มาทำงาน
            const absenceSummary = nonPresentEmployees.reduce((acc, curr) => {
                acc[curr.status] = (acc[curr.status] || 0) + 1;
                return acc;
            }, {});

            const last7Dates = useMemo(() => {
                const sortedDates = Array.from(availableDates).sort((a,b) => new Date(a) - new Date(b));
                const currentIdx = sortedDates.indexOf(rawDate);
                return currentIdx !== -1 
                    ? sortedDates.slice(Math.max(0, currentIdx - 6), currentIdx + 1)
                    : sortedDates.slice(-7);
            }, [availableDates, rawDate]);

            const warningEmployees = useMemo(() => {
                return filtered.filter(emp => {
                    let absent7DayCount = 0;
                    last7Dates.forEach(d => {
                        const status = emp.statusesByDate?.[d] || 'ไม่มีข้อมูล';
                        if (['ขาดงาน', 'ลาป่วย', 'ลากิจ', 'ลาพักร้อน', 'ลาอื่นๆ'].includes(status)) {
                            absent7DayCount++;
                        }
                    });
                    return absent7DayCount > 3; // ขาด/ลาเกิน 3 วัน (4 วันขึ้นไป)
                }).map(emp => {
                    let absent7DayCount = 0;
                    last7Dates.forEach(d => {
                        const status = emp.statusesByDate?.[d] || 'ไม่มีข้อมูล';
                        if (['ขาดงาน', 'ลาป่วย', 'ลากิจ', 'ลาพักร้อน', 'ลาอื่นๆ'].includes(status)) {
                            absent7DayCount++;
                        }
                    });
                    return { ...emp, absentCount7Days: absent7DayCount };
                }).sort((a, b) => b.absentCount7Days - a.absentCount7Days);
            }, [filtered, last7Dates]);

            // เพิ่มฟังก์ชันสำหรับ Download CSV
            const handleDownloadCSV = () => {
                const headers = ['รหัสพนักงาน', 'ชื่อ-นามสกุล', 'ไลน์', 'กลุ่ม', 'ตำแหน่ง', 'สถานะ'];
                const rows = filtered.map(e => [
                    `"${e.id}"`, 
                    `"${e.name}"`, 
                    `"${e.line}"`, 
                    `"${e.group}"`, 
                    `"${e.role}"`, 
                    `"${e.status}"`
                ]);
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + 
                    [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `haier_attendance_${rawDate}_${activeShift}_${selectedLine}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Skeleton Loading (โหลดข้อมูลแบบโครงร่าง)
            if (isSyncing) {
                return (
                    <div className="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-200 animate-pulse w-full print-hidden">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                            <div className="flex items-center gap-4">
                                <div className="w-3 h-12 bg-slate-200 rounded-full"></div>
                                <div>
                                    <div className="h-8 w-64 bg-slate-200 rounded-xl mb-2"></div>
                                    <div className="h-3 w-40 bg-slate-200 rounded-full"></div>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <div className="h-10 w-48 bg-slate-100 rounded-full"></div>
                                <div className="h-10 w-10 bg-slate-100 rounded-2xl"></div>
                                <div className="h-10 w-10 bg-slate-100 rounded-2xl"></div>
                            </div>
                        </div>
                        <hr className="border-slate-100 mb-6" />
                        <div className="h-[100px] bg-slate-50 rounded-[2rem] mb-8 border border-slate-100"></div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="h-[400px] bg-slate-50 rounded-[2rem] border border-slate-100"></div>
                            <div className="h-[400px] bg-slate-50 rounded-[2rem] border border-slate-100"></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-200 animate-in fade-in duration-500 relative">
                    {/* Anomaly Alert Banner */}
                    {isAnomaly && (
                        <div className="print-hidden bg-red-50 border border-red-200 p-4 rounded-2xl mb-8 flex items-start gap-4 shadow-sm animate-in slide-in-from-top-4">
                            <div className="bg-red-100 text-red-600 w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 shadow-inner">
                                <i className="fa-solid fa-triangle-exclamation text-lg"></i>
                            </div>
                            <div>
                                <h3 className="text-red-800 font-black text-[14px] uppercase tracking-widest">แจ้งเตือน: อัตราการขาด/ลางานสูงผิดปกติ</h3>
                                <p className="text-red-600 text-[13px] mt-1 font-bold">
                                    พบพนักงานขาดและลางานจำนวน <span className="font-black bg-white px-1.5 py-0.5 rounded shadow-sm">{absentCount} คน</span> (คิดเป็น {absentRate.toFixed(1)}% ของพนักงานในกะ/ไลน์นี้) ซึ่งเกินเกณฑ์เฝ้าระวัง 10% อาจส่งผลกระทบต่อเป้าหมายการผลิต
                                </p>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-8 mb-8">
                        <div className="flex flex-col sm:flex-row sm:items-center gap-6 xl:gap-8 w-full xl:w-auto">
                            <div className="flex items-center gap-4">
                                <div className="w-3 h-12 bg-blue-500 rounded-full"></div>
                                <div>
                                    <h2 className="text-3xl font-black italic text-slate-800 flex items-center gap-2">
                                        WOR MAP / <span className="text-slate-500 font-bold">平面图</span>
                                    </h2>
                                    <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest mt-1 flex items-center gap-2 print-hidden">
                                        SYNCING FROM SHEET: <span className="text-slate-400">ATTENDANCE</span>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="print-hidden">
                                <CustomDashboardDatePicker rawDate={rawDate} setRawDate={setRawDate} availableDates={availableDates} />
                            </div>
                            
                            {/* แสดงข้อมูลวันที่และกะ เฉพาะตอนสั่งพิมพ์ (PDF) */}
                            <div className="hidden print:block border-l-2 border-slate-200 pl-4">
                                <p className="text-sm font-black text-slate-800">ประจำวันที่: {new Date(rawDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}</p>
                                <p className="text-xs font-bold text-slate-500 mt-1">ข้อมูล: {selectedLine} | กะการทำงาน: {activeShift}</p>
                            </div>

                            <div className="flex flex-wrap items-center gap-2.5 sm:ml-auto print-hidden shrink-0 mt-4 sm:mt-0">
                                {/* ปุ่มเปิด Modal ผู้ขาด/ลาเกิน 3 วัน (Warning) */}
                                <button onClick={() => setShowWarningModal(true)} className="shrink-0 bg-rose-600 text-white px-4 h-10 rounded-[14px] flex items-center justify-center shadow-md transform hover:scale-105 active:scale-90 transition-all cursor-pointer gap-2 text-[13px] font-bold relative border-none outline-none" title="เฝ้าระวังพนักงานที่ขาด/ลาเกิน 3 วัน">
                                    <i className="fa-solid fa-triangle-exclamation"></i> <span className="whitespace-nowrap hidden sm:inline">เฝ้าระวัง</span>
                                    {warningEmployees.length > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-rose-900 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border border-rose-400 shadow-sm">{warningEmployees.length}</span>
                                    )}
                                </button>

                                {/* ปุ่มเปิด Modal ดูผู้ขาดลา */}
                                <button onClick={() => setShowAbsentModal(true)} className="shrink-0 bg-amber-500 text-white px-4 h-10 rounded-[14px] flex items-center justify-center shadow-md transform hover:scale-105 active:scale-90 transition-all cursor-pointer gap-2 text-[13px] font-bold border-none outline-none" title="ดูรายชื่อผู้ขาด/ลา">
                                    <i className="fa-solid fa-user-slash"></i> <span className="whitespace-nowrap hidden sm:inline">ดูผู้ขาด/ลา</span>
                                </button>

                                <button onClick={handleDownloadCSV} className="shrink-0 bg-emerald-500 text-white w-10 h-10 rounded-[14px] flex items-center justify-center shadow-md transform hover:scale-105 active:scale-90 transition-all cursor-pointer border-none outline-none" title="ดาวน์โหลด CSV">
                                    <i className="fa-solid fa-file-csv text-sm"></i>
                                </button>
                                <button onClick={() => window.print()} className="shrink-0 bg-slate-700 text-white w-10 h-10 rounded-[14px] flex items-center justify-center shadow-md transform hover:scale-105 active:scale-90 transition-all cursor-pointer border-none outline-none" title="พิมพ์รายงาน (PDF)">
                                    <i className="fa-solid fa-file-pdf text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <div className="flex flex-wrap justify-end items-center gap-5 xl:gap-8">
                            <div className="flex flex-wrap gap-3 items-center print-hidden">
                                {STATUS_LEGEND.map(l => {
                                    if(l.label === 'ไม่มีข้อมูล') return null; // ซ่อนคำว่าไม่มีข้อมูลบนแถบข้างบนสุด
                                    return (
                                        <div key={l.label} className="flex items-center gap-1.5">
                                            <div className={`w-[20px] h-[20px] rounded ${l.bg} flex items-center justify-center shadow-sm`}>
                                                <i className="fa-solid fa-user text-white text-[10px]"></i>
                                            </div>
                                            <span className="text-[11px] font-black text-slate-700">{l.label}</span>
                                        </div>
                                    )
                                })}
                            </div>
                            <div className="flex flex-wrap gap-3">
                                <div className="bg-white border border-slate-200 px-5 py-2.5 rounded-[1.2rem] shadow-sm flex items-center justify-center gap-3 min-w-[100px]">
                                    <i className="fa-solid fa-users text-[#3b82f6] text-[20px]"></i>
                                    <div className="text-center leading-tight">
                                        <p className="text-[18px] font-black text-slate-800 leading-none">{stats.total}</p>
                                        <p className="text-[9px] font-black text-slate-400 mt-1">ทั้งหมด</p>
                                    </div>
                                </div>
                                <div className="bg-white border border-slate-200 px-5 py-2.5 rounded-[1.2rem] shadow-sm flex items-center justify-center gap-3 min-w-[100px]">
                                    <i className="fa-solid fa-id-badge text-[#06b6d4] text-[20px]"></i>
                                    <div className="text-center leading-tight">
                                        <p className="text-[18px] font-black text-slate-800 leading-none">{stats.came}</p>
                                        <p className="text-[9px] font-black text-slate-400 mt-1">มาจริง</p>
                                    </div>
                                </div>
                                <div className="bg-white border border-slate-200 px-5 py-2.5 rounded-[1.2rem] shadow-sm flex items-center justify-center gap-3 min-w-[100px]">
                                    <i className="fa-solid fa-user-check text-[#10b981] text-[20px]"></i>
                                    <div className="text-center leading-tight">
                                        <p className="text-[18px] font-black text-slate-800 leading-none">{stats.normal}</p>
                                        <p className="text-[9px] font-black text-slate-400 mt-1">มาปกติ</p>
                                    </div>
                                </div>
                                <div className="bg-white border border-slate-200 px-5 py-2.5 rounded-[1.2rem] shadow-sm flex items-center justify-center gap-3 min-w-[100px]">
                                    <i className="fa-solid fa-arrow-trend-up text-[#10b981] text-[20px]"></i>
                                    <div className="text-center leading-tight">
                                        <p className="text-[18px] font-black text-slate-800 leading-none">{stats.rate}%</p>
                                        <p className="text-[9px] font-black text-slate-400 mt-1">มาทำงาน %</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr className="border-slate-800 mb-6" />

                    {selectedLine === 'ALL' ? (
                        <SummaryDashboard 
                            filteredEmps={filtered} 
                            employees={employees} 
                            rawDate={rawDate} 
                            availableDates={availableDates} 
                            activeShift={activeShift} 
                            STATUS_LEGEND={STATUS_LEGEND} 
                        />
                    ) : (
                        <>
                            <div className="relative h-[380px] w-full flex items-center">
                                <div className="absolute inset-y-0 left-1/4 w-[1px] bg-slate-300 z-0"></div>
                                <div className="absolute inset-y-0 left-2/4 w-[1px] bg-slate-300 z-0"></div>
                                <div className="absolute inset-y-0 left-3/4 w-[1px] bg-slate-300 z-0"></div>

                                <div className="absolute left-0 right-0 h-14 z-0 overflow-hidden shadow-inner border-y-[3px] border-[#1e293b] conveyor-bg-animate" style={{
                                    backgroundColor: '#2c3e50',
                                    backgroundImage: `
                                        linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.05) 75%, rgba(255,255,255,0.05)),
                                        linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.05) 75%, rgba(255,255,255,0.05))
                                    `,
                                    backgroundSize: '20px 20px'
                                }}>
                                    <div className="absolute w-full h-[2px] bg-white/20 z-0 top-1/2 -translate-y-1/2"></div>
                                    <div className="absolute inset-0 flex items-center z-10 animate-conveyor-items">
                                        <div className="flex-1 flex justify-around">
                                            {[...Array(6)].map((_, i) => (
                                                <div key={`set1-${i}`} className="bg-[#f8fafc] px-6 py-1.5 rounded-lg flex items-center gap-3 border-b-4 border-slate-300 shadow-md">
                                                    <span className="text-[10px] font-black text-slate-400 tracking-widest">HAIER</span>
                                                    <div className="w-2.5 h-2.5 bg-emerald-400 rounded-full shadow-[0_0_5px_#34d399] animate-pulse"></div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex-1 flex justify-around">
                                            {[...Array(6)].map((_, i) => (
                                                <div key={`set2-${i}`} className="bg-[#f8fafc] px-6 py-1.5 rounded-lg flex items-center gap-3 border-b-4 border-slate-300 shadow-md">
                                                    <span className="text-[10px] font-black text-slate-400 tracking-widest">HAIER</span>
                                                    <div className="w-2.5 h-2.5 bg-emerald-400 rounded-full shadow-[0_0_5px_#34d399] animate-pulse"></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-4 h-full relative z-10 w-full">
                                    {SECTIONS.map(sec => {
                                        const secEmps = filtered.filter(e => sec.keywords.some(k => (e.group || '').toLowerCase().includes(k) || (e.role || '').toLowerCase().includes(k)));
                                        const presCount = secEmps.filter(e => e.status === 'มาปกติ' || e.status === 'สาย').length;
                                        const topHalf = secEmps.slice(0, Math.ceil(secEmps.length / 2));
                                        const bottomHalf = secEmps.slice(Math.ceil(secEmps.length / 2));
                                        
                                        return (
                                            <div key={sec.id} className="flex flex-col items-center justify-between py-3">
                                                <div className="flex flex-wrap gap-1 justify-center w-[85%] max-w-[200px]">
                                                    {topHalf.map((e, i) => <PersonMapIcon key={i} employee={e} groupName={sec.name} />)}
                                                </div>
                                                <div className="bg-[#f8fafc] rounded-[2rem] p-4 w-[80%] max-w-[220px] text-center shadow-[0_15px_30px_rgba(0,0,0,0.1)] border border-slate-200 relative my-2">
                                                    <h4 className="text-[20px] font-black italic text-slate-800 leading-none">{sec.name}</h4>
                                                    <p className="text-[10px] font-bold text-slate-500 mt-1">{sec.sub}</p>
                                                    <div className="mt-3 inline-flex items-center justify-center gap-2 bg-white px-4 py-1.5 rounded-full border shadow-sm">
                                                        <span className="text-lg font-black text-emerald-500">{presCount}</span>
                                                        <span className="text-slate-300 font-light">/</span>
                                                        <span className="text-lg font-black text-slate-500">{secEmps.length}</span>
                                                    </div>
                                                </div>
                                                <div className="flex flex-wrap gap-1 justify-center w-[85%] max-w-[200px]">
                                                    {bottomHalf.map((e, i) => <PersonMapIcon key={i} employee={e} groupName={sec.name} />)}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <hr className="border-slate-800 mt-6 mb-8" />

                            <div className="grid grid-cols-5 gap-4">
                                {[
                                    { t: 'MANAGERS', keywords: ['manager', 'ผู้จัดการ', 'mgr'], border: 'border-[#bfdbfe]', text: 'text-[#1e3a8a]', icon: 'fa-star' },
                                    { t: 'SUPERVISORS', keywords: ['supervisor', 'ซุปเปอร์', 'sup'], border: 'border-[#e9d5ff]', text: 'text-[#581c87]', icon: 'fa-shield-halved' },
                                    { t: 'LEADERS', keywords: ['leader', 'หัวหน้า', 'lead'], border: 'border-[#6ee7b7]', text: 'text-[#064e3b]', icon: 'fa-medal' },
                                    { t: 'OFFICE', keywords: ['office', 'ออฟฟิศ', 'สำนักงาน'], border: 'border-[#86efac]', text: 'text-[#14532d]', icon: 'fa-briefcase' },
                                    { t: 'COST', keywords: ['cost', 'คอส', 'ต้นทุน'], border: 'border-[#fecdd3]', text: 'text-[#881337]', icon: 'fa-calculator' }
                                ].map(g => {
                                    const baseEmps = ['MANAGERS', 'OFFICE', 'COST'].includes(g.t) ? dynamicEmployees : filtered;
                                    const matchedEmps = baseEmps.filter(e => {
                                        const grp = String(e.group || '').toLowerCase();
                                        const rol = String(e.role || '').toLowerCase();
                                        const full = String(e.fullRowStr || ''); 
                                        return g.keywords.some(k => {
                                            const kw = k.toLowerCase();
                                            return grp.includes(kw) || rol.includes(kw) || full.includes(kw); 
                                        });
                                    });

                                    return (
                                        <div key={g.t} className={`bg-white px-5 py-4 rounded-[2rem] border ${g.border} shadow-sm flex flex-col min-h-[100px]`}>
                                            <div className={`mb-3 border-b ${g.border} pb-1.5 inline-block pr-4`}>
                                                <h5 className={`text-[11px] font-black ${g.text} uppercase italic tracking-widest flex items-center gap-2`}>
                                                    <i className={`fa-solid ${g.icon}`}></i> {g.t}
                                                </h5>
                                            </div>
                                            <div className="flex flex-wrap gap-1">
                                                {matchedEmps.map((e, i) => <PersonMapIcon key={i} employee={e} groupName={g.t} />)}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </>
                    )}

                    {/* Modal รายชื่อคนขาด/ลาเกิน 3 วัน (Warning Modal) */}
                    {showWarningModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200 border border-slate-100">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-rose-50">
                                    <h3 className="text-xl font-black text-rose-800 flex items-center gap-3">
                                        <div className="w-10 h-10 bg-rose-200 text-rose-600 rounded-xl flex items-center justify-center">
                                            <i className="fa-solid fa-triangle-exclamation"></i>
                                        </div>
                                        เฝ้าระวัง: รายชื่อที่ขาด/ลางานเกิน 3 วัน (ในรอบ 7 วัน)
                                    </h3>
                                    <button onClick={() => setShowWarningModal(false)} className="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors shadow-sm">
                                        <i className="fa-solid fa-xmark text-lg"></i>
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                                    {/* กล่องสรุปสถิติ */}
                                    <div className="flex flex-wrap gap-3 mb-6">
                                        <div className="bg-rose-600 text-white px-4 py-2.5 rounded-xl shadow-sm text-sm font-black flex items-center gap-2">
                                            พบกลุ่มเสี่ยงทั้งหมด <span className="bg-white/20 px-2.5 py-0.5 rounded-md">{warningEmployees.length}</span> คน
                                        </div>
                                        <div className="bg-slate-50 text-slate-500 border border-slate-200 px-4 py-2.5 rounded-xl shadow-sm text-xs font-bold flex items-center">
                                            * นับเฉพาะพนักงานที่มีสถานะ ขาดงาน, ลาป่วย, ลากิจ, ลาพักร้อน หรือ ลาอื่นๆ
                                        </div>
                                    </div>
                                    
                                    {/* ตารางรายชื่อ */}
                                    <div className="rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-500 font-black text-[11px] uppercase tracking-widest border-b border-slate-200">
                                                <tr>
                                                    <th className="px-6 py-4">รหัสพนักงาน</th>
                                                    <th className="px-6 py-4">ชื่อ-นามสกุล</th>
                                                    <th className="px-6 py-4">สายการผลิต / กลุ่ม</th>
                                                    <th className="px-6 py-4 text-center">รวมวันหยุด (ใน 7 วัน)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-bold text-slate-600">
                                                {warningEmployees.length > 0 ? (
                                                    warningEmployees.map((emp, idx) => (
                                                        <tr key={idx} className="hover:bg-rose-50/30 transition-colors">
                                                            <td className="px-6 py-4 text-[12px]">{emp.id}</td>
                                                            <td className="px-6 py-4">{emp.name || 'ไม่ระบุ'}</td>
                                                            <td className="px-6 py-4">
                                                                <span className="text-blue-600 font-black bg-blue-50 px-2.5 py-1 rounded-md text-[10px] mr-2 uppercase tracking-wider">{emp.line}</span>
                                                                <span className="text-[12px]">{emp.group}</span>
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                <span className="bg-rose-100 text-rose-600 px-3.5 py-1 rounded-full text-[12px] font-black shadow-sm inline-block">

                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))
                                                ) : (

                    )}

                    {/* Modal รายชื่อคนขาด/ลางาน */}
                    {showAbsentModal && (

                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="text-xl font-black text-slate-800 flex items-center gap-3">
                                        <div className="w-10 h-10 bg-amber-100 text-amber-500 rounded-xl flex items-center justify-center">
                                            <i className="fa-solid fa-user-slash"></i>
                                        </div>
                                        รายชื่อพนักงานที่ไม่ได้มาทำงาน
                                    </h3>

                                        <i className="fa-solid fa-xmark text-lg"></i>

                                <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
                                    {/* กล่องสรุปสถิติ */}
                                    <div className="flex flex-wrap gap-3 mb-6">
                                        <div className="bg-slate-800 text-white px-4 py-2.5 rounded-xl shadow-sm text-sm font-black flex items-center gap-2">
                                            รวมทั้งหมด <span className="bg-white/20 px-2.5 py-0.5 rounded-md">{nonPresentEmployees.length}</span>
                                        </div>
                                        {Object.entries(absenceSummary).map(([status, count]) => {
                                            const config = STATUS_LEGEND.find(l => status.includes(l.label)) || { bg: 'bg-slate-200', color: 'text-slate-500' };
                                            return (
                                                <div key={status} className={`px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 text-sm font-bold flex items-center gap-2 bg-slate-50 ${config.color}`}>
                                                    {status} <span className={`px-2.5 py-0.5 rounded-md text-white font-black ${config.bg}`}>{count}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    
                                    {/* ตารางรายชื่อ */}
                                    <div className="rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-500 font-black text-[11px] uppercase tracking-widest border-b border-slate-200">
                                                <tr>
                                                    <th className="px-6 py-4">รหัสพนักงาน</th>
                                                    <th className="px-6 py-4">ชื่อ-นามสกุล</th>
                                                    <th className="px-6 py-4">สายการผลิต / กลุ่ม</th>
                                                    <th className="px-6 py-4">สถานะล่าสุด</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-bold text-slate-600">
                                                {nonPresentEmployees.length > 0 ? (
                                                    nonPresentEmployees.map((emp, idx) => {
                                                        const config = STATUS_LEGEND.find(l => emp.status.includes(l.label)) || { bg: 'bg-slate-200', color: 'text-slate-500' };
                                                        return (
                                                            <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="px-6 py-4 text-[12px]">{emp.id}</td>
                                                                <td className="px-6 py-4">{emp.name || 'ไม่ระบุ'}</td>
                                                                <td className="px-6 py-4">
                                                                    <span className="text-blue-600 font-black bg-blue-50 px-2.5 py-1 rounded-md text-[10px] mr-2 uppercase tracking-wider">{emp.line}</span>
                                                                    <span className="text-[12px]">{emp.group}</span>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    <span className={`${config.bg} text-white px-3.5 py-1 rounded-full text-[11px] font-black shadow-sm inline-block`}>
                                                                        {emp.status}
                                                                    </span>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })
                                                ) : (
                                                    <tr>
                                                        <td colSpan="4" className="px-6 py-12 text-center text-slate-400 italic font-bold">
                                                            <i className="fa-regular fa-face-smile text-2xl block mb-2 opacity-50"></i>
                                                            มาครบทุกคน ไม่มีผู้ขาด/ลางาน
                                                        </td>

                                        </table>

                                </div>
                            </div>
                        </div>
