                </div>
            );
        };

        const AttendanceView = ({ employees }) => {
            const [searchId, setSearchId] = useState('');
            const [searchedEmp, setSearchedEmp] = useState(null);
            const [selectedCycle, setSelectedCycle] = useState('2026-03-21');

            const payrollCycles = [
                { start: '2026-01-21', end: '2026-02-20', label: 'รอบ 21 ม.ค. 2026 - 20 ก.พ. 2026' },
                { start: '2026-02-21', end: '2026-03-20', label: 'รอบ 21 ก.พ. 2026 - 20 มี.ค. 2026' },
                { start: '2026-03-21', end: '2026-04-20', label: 'รอบ 21 มี.ค. 2026 - 20 เม.ย. 2026' },
                { start: '2026-04-21', end: '2026-05-20', label: 'รอบ 21 เม.ย. 2026 - 20 พ.ค. 2026' }
            ];

            const handleSearch = (e) => {
                if(e) e.preventDefault();
                const emp = employees.find(e => e.id === searchId.trim());
                setSearchedEmp(emp || null);
            };

            const getStats = useMemo(() => {
                if(!searchedEmp) return { normal: 0, late: 0, leave: 0, absent: 0, ot: 0, dayShiftCount: 0, nightShiftCount: 0, details: [] };
                
                const cycle = payrollCycles.find(c => c.start === selectedCycle);
                const start = new Date(cycle.start);
                const end = new Date(cycle.end);
                
                let stats = { normal: 0, late: 0, leave: 0, absent: 0, ot: 0, dayShiftCount: 0, nightShiftCount: 0, details: [] };
                
                const allDates = new Set([
                    ...Object.keys(searchedEmp.statusesByDate || {}),
                    ...Object.keys(searchedEmp.otByDate || {})
                ]);

                allDates.forEach(dateStr => {
                    const d = new Date(dateStr);
                    if(d >= start && d <= end) {
                        if (searchedEmp.resignedDate && d > new Date(searchedEmp.resignedDate)) {
                            return;
                        }
                        
                        const status = searchedEmp.statusesByDate?.[dateStr] || 'ไม่มีข้อมูล';
                        const otValue = parseFloat(searchedEmp.otByDate?.[dateStr]) || 0;
                        
                        if (status !== 'ไม่มีข้อมูล' || otValue > 0) {
                            if(status === 'มาปกติ') stats.normal++;
                            else if(status === 'สาย') stats.late++;
                            else if(status.includes('ลา')) stats.leave++; // นับรวม 'ลาพักร้อน' อยู่ในนี้แล้ว
                            else if(status === 'ขาดงาน') stats.absent++;
                            
                            // ตรวจสอบและนับจำนวนกะการทำงาน (กะเช้า/กะดึก) ในวันที่นั้นๆ
                            const dateShift = searchedEmp.shiftsByDate?.[dateStr];
                            if (dateShift === 'Shift A') stats.dayShiftCount++;
                            else if (dateShift === 'Shift B') stats.nightShiftCount++;
                            
                            stats.ot += otValue;
                            stats.details.push({ date: dateStr, status: status, ot: otValue, shift: dateShift });
                        }
                    }
                });
                
                stats.details.sort((a,b) => new Date(b.date) - new Date(a.date));
                return stats;
            }, [searchedEmp, selectedCycle]);

            // สร้างกราฟวงแหวน (Donut Chart) จากข้อมูลในรอบ
            const donutGradientStr = useMemo(() => {
                const totalDays = getStats.normal + getStats.late + getStats.leave + getStats.absent;
                if (totalDays === 0) return 'conic-gradient(#e2e8f0 0% 100%)';
                
                const nPct = (getStats.normal / totalDays) * 100;
                const laPct = (getStats.late / totalDays) * 100;
                const lePct = (getStats.leave / totalDays) * 100;
                const aPct = (getStats.absent / totalDays) * 100;
                
                let current = 0;
                const parts = [];
                if (nPct > 0) { parts.push(`#10b981 ${current}% ${current + nPct}%`); current += nPct; }
                if (laPct > 0) { parts.push(`#f97316 ${current}% ${current + laPct}%`); current += laPct; }
                if (lePct > 0) { parts.push(`#94a3b8 ${current}% ${current + lePct}%`); current += lePct; }
                if (aPct > 0) { parts.push(`#ef4444 ${current}% ${current + aPct}%`); current += aPct; }
                
                return `conic-gradient(${parts.join(', ')})`;
            }, [getStats]);

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-in fade-in duration-500 pb-20">
                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-10">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-[1.5rem] flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm">
                                <i className="fa-solid fa-user-clock"></i>
                            </div>
                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">ตรวจสอบเวลาการมาทำงาน</h2>
                            <div className="mt-2 inline-block bg-slate-50 border border-slate-100 px-6 py-1.5 rounded-full">
                                <p className="text-slate-400 text-[13px] font-bold">รอบตัดเงินเดือน วันที่ 21 ถึง วันที่ 20 ของเดือนถัดไป</p>
                            </div>
                        </div>

                        <form onSubmit={handleSearch} className="flex gap-3 max-w-xl mx-auto mb-10">
                            <div className="relative flex-1 group">
                                <div className="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-blue-500 transition-colors">
                                    <i className="fa-regular fa-id-card text-xl"></i>
                                </div>
                                <input 
                                    type="text" value={searchId} onChange={(e)=>setSearchId(e.target.value)}
                                    placeholder="240160490" 
                                    className="w-full bg-slate-50 border border-slate-100 rounded-[1.2rem] pl-14 pr-5 py-4 font-black text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:bg-white transition-all text-lg"
                                />
                            </div>
                            <button type="submit" className="bg-blue-600 text-white px-10 rounded-[1.2rem] font-black hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95 flex items-center gap-2">
                                <i className="fa-solid fa-magnifying-glass"></i> ค้นหา
                            </button>
                        </form>

                        {searchedEmp ? (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white rounded-[2rem] border border-slate-100 p-8 flex flex-col md:flex-row items-center gap-8 shadow-[0_10px_30px_-5px_rgba(0,0,0,0.03)]">
                                    <div className="relative w-28 h-28 flex-shrink-0 mx-auto md:mx-0">
                                        <div className="w-full h-full rounded-full shadow-inner" style={{ background: donutGradientStr }}></div>
                                        <div className="absolute inset-0 m-auto w-[85px] h-[85px] bg-slate-50 rounded-full flex items-center justify-center border-[3px] border-white shadow-sm text-blue-500 text-3xl">
                                            <i className="fa-solid fa-person text-blue-400"></i>
                                        </div>
                                    </div>
                                    <div className="flex-1 text-center md:text-left">
                                        <h3 className="text-[34px] font-black text-slate-800 leading-none mb-4">{searchedEmp.name}</h3>
                                        <div className="flex flex-wrap justify-center md:justify-start gap-2.5">
                                            <span className="bg-slate-50 border border-slate-100 px-4 py-1.5 rounded-full text-[11px] font-black text-slate-400 flex items-center gap-2">
                                                <i className="fa-solid fa-hashtag text-[10px] opacity-60"></i> {searchedEmp.id}
                                            </span>
                                            <span className="bg-slate-50 border border-slate-100 px-4 py-1.5 rounded-full text-[11px] font-black text-slate-400 flex items-center gap-2">
                                                <i className="fa-solid fa-location-dot text-[10px] opacity-60"></i> {searchedEmp.line} - {searchedEmp.group}
                                            </span>
                                            <span className="bg-slate-50 border border-slate-100 px-4 py-1.5 rounded-full text-[11px] font-black text-slate-400 flex items-center gap-2">
                                                <i className="fa-solid fa-user-tie text-[10px] opacity-60"></i> {searchedEmp.role || 'Manager'}
                                            </span>
                                            {searchedEmp.resignedDate && (
                                                <span className="bg-red-50 border border-red-100 px-4 py-1.5 rounded-full text-[11px] font-black text-red-500 flex items-center gap-2">
                                                    <i className="fa-solid fa-user-xmark text-[10px]"></i> ลาออกเมื่อ {new Date(searchedEmp.resignedDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' })}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="w-full md:w-auto mt-4 md:mt-0">
                                        <div className="bg-slate-50/50 p-2 rounded-2xl border border-slate-100">
                                            <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest ml-3 mb-1">เลือกรอบเงินเดือน</label>
                                            <select 
                                                value={selectedCycle} 
                                                onChange={(e)=>setSelectedCycle(e.target.value)}
                                                className="bg-white border-none text-[13px] font-black text-blue-600 outline-none pr-8 py-2.5 pl-3 rounded-xl cursor-pointer w-full shadow-sm"
                                            >
                                                {payrollCycles.map(c => <option key={c.start} value={c.start}>{c.label}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                    <div className="bg-white border border-slate-100 p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">มาทำงานปกติ</p>
                                        <p className="text-4xl font-black text-emerald-500 leading-none mb-1">{getStats.normal}<span className="text-3xl opacity-50">/{getStats.details.length}</span> <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="bg-white border border-slate-100 p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">มาสาย</p>
                                        <p className="text-4xl font-black text-orange-500 leading-none mb-1">{getStats.late} <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="bg-white border border-slate-100 p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">ลาหยุด/ลากิจ/ลาป่วย/พักร้อน</p>
                                        <p className="text-4xl font-black text-slate-300 leading-none mb-1">{getStats.leave} <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="bg-white border border-slate-100 p-6 rounded-[2rem] text-center shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">ขาดงาน</p>
                                        <p className="text-4xl font-black text-red-500 leading-none mb-1">{getStats.absent} <span className="text-xs text-slate-400">วัน</span></p>
                                    </div>
                                    <div className="bg-white border border-slate-100 p-6 rounded-[2rem] text-center shadow-sm bg-blue-50/20 border-blue-100">
                                        <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2 italic">ชั่วโมงโอทีรวม</p>
                                        <p className="text-4xl font-black text-blue-600 leading-none mb-1">{getStats.ot.toFixed(1)} <span className="text-xs text-slate-400">ชม.</span></p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="bg-slate-50/50 px-10 py-5 flex flex-col md:flex-row items-start md:items-center justify-between border-b border-slate-100 gap-4">
                                        <div>
                                            <h4 className="text-lg font-black text-slate-800">รายละเอียดการลงเวลาและโอที</h4>
                                            <div className="flex gap-3 mt-2">
                                                <span className="text-[11px] font-black text-slate-500 bg-white px-3 py-1 rounded-full border shadow-sm flex items-center gap-1.5">
                                                    <i className="fa-solid fa-sun text-orange-500"></i> ทำกะเช้า {getStats.dayShiftCount} วัน
                                                </span>
                                                <span className="text-[11px] font-black text-slate-500 bg-white px-3 py-1 rounded-full border shadow-sm flex items-center gap-1.5">
                                                    <i className="fa-solid fa-moon text-indigo-500"></i> ทำกะดึก {getStats.nightShiftCount} วัน
                                                </span>
                                            </div>
                                        </div>
                                        <span className="text-[11px] font-bold text-slate-400 bg-white px-4 py-1.5 rounded-full border">ทั้งหมด {getStats.details.length} วันที่มีข้อมูล</span>
                                    </div>
                                    <div className="max-h-[500px] overflow-y-auto custom-scrollbar">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-white sticky top-0 z-10">
                                                <tr>
                                                    <th className="px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b">วันที่ (DATE)</th>
                                                    <th className="px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b text-center">สถานะ (STATUS)</th>
                                                    <th className="px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b text-center">กะ (SHIFT)</th>
                                                    <th className="px-10 py-4 text-[10px] font-black text-slate-300 uppercase tracking-widest border-b text-right">โอที (OT)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {getStats.details.map((d, i) => {
                                                    const config = STATUS_LEGEND.find(l => d.status.includes(l.label));
                                                    const bgClass = config ? config.bg : 'bg-slate-200';
                                                    const textClass = config ? 'text-white' : 'text-slate-500';
                                                    
                                                    let shiftDisplay = '-';
                                                    let shiftColor = 'text-slate-400';
                                                    if (d.shift === 'Shift A') { shiftDisplay = 'DAY'; shiftColor = 'text-orange-500 font-black'; }
                                                    else if (d.shift === 'Shift B') { shiftDisplay = 'NIGHT'; shiftColor = 'text-indigo-500 font-black'; }

                                                    return (
                                                        <tr key={i} className="hover:bg-slate-50/50 transition-colors group">
                                                            <td className="px-10 py-5 text-sm font-bold text-slate-600 border-b border-slate-50">
                                                                {new Date(d.date).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}
                                                            </td>
                                                            <td className="px-10 py-5 border-b border-slate-50 text-center">
                                                                <span className={`inline-block px-4 py-1.5 rounded-full text-[11px] font-black ${bgClass} ${textClass} shadow-sm`}>
                                                                    {d.status}
                                                                </span>
                                                            </td>
                                                            <td className="px-10 py-5 border-b border-slate-50 text-center">
                                                                <span className={`text-[12px] ${shiftColor}`}>
                                                                    {shiftDisplay}
                                                                </span>
                                                            </td>
                                                            <td className="px-10 py-5 text-right font-black text-slate-300 border-b border-slate-50 group-hover:text-blue-500">
                                                                {d.ot > 0 ? <span className="text-[#ea580c] text-lg">{d.ot}</span> : '-'}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {getStats.details.length === 0 && (
                                                    <tr>
                                                        <td colSpan="4" className="px-10 py-20 text-center text-slate-300 italic font-bold">ไม่พบข้อมูลการลงเวลาในรอบนี้</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-20 opacity-30 italic">
                                <i className="fa-solid fa-magnifying-glass text-6xl mb-6 block text-slate-200"></i>
                                <p className="font-bold text-slate-400">กรุณากรอกรหัสพนักงานเพื่อค้นหาข้อมูล</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const OriginalOTSystem = ({ globalEmployees }) => {
          const [employees, setEmployees] = useState([]);
          const [loading, setLoading] = useState(true);
          const [saving, setSaving] = useState(false);
          const [status, setStatus] = useState(null);
          const [savedIds, setSavedIds] = useState(new Set());
          const [shift, setShift] = useState('Shift A');
          const [selectedLine, setSelectedLine] = useState(2);
          const [targetDate, setTargetDate] = useState(getOriginalLocalDateString());
          
          // ระบบค้นหาและยืนยันการบันทึก
          const [searchTerm, setSearchTerm] = useState('');
          const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, groupId: null, groupName: '' });
          
          const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbySQvnwrMOPd9FtOR43vb5O9P_rILTws36qI71bKTp1SP5aK2RmhsTZGMeLIia882X6/exec"; 
          const SHEET_ID = '1R3-R-HsrfGBt1L2wMFrsIBZnCz20YNRhVTWnb4Ygxto';
          const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

          const ORIGINAL_UI_GROUPS = [
            { id: 'front', name: 'หัวไลน์', sub: '前装-Input', keywords: ['input', '前装', 'หัวไลน์'], isGlobal: false },
            { id: 'middle', name: 'กลางไลน์', sub: '装配-Middle', keywords: ['middle', '装配', 'กลางไลน์'], isGlobal: false },
            { id: 'test', name: 'ห้องทดสอบ', sub: '测试房-Cooling', keywords: ['cooling', '测试房', 'ทดสอบ', 'test'], isGlobal: false },
            { id: 'final', name: 'ท้ายไลน์', sub: '后装-Final', keywords: ['final', '后装', 'ท้ายไลน์'], isGlobal: false },
            { id: 'office', name: 'ออฟฟิศ', sub: '办公室-Office', keywords: ['office', '办公室', 'ออฟฟิศ', 'สำนักงาน'], isGlobal: true },
            { id: 'cost', name: 'คอส', sub: 'Cost-成本', keywords: ['cost', '成本', 'คอส'], isGlobal: true }
          ];

          const [groupState, setGroupState] = useState({
            front: { defaultHours: 2.5, selectedIds: [] },
            middle: { defaultHours: 2.5, selectedIds: [] },
            test: { defaultHours: 2.5, selectedIds: [] },
            final: { defaultHours: 2.5, selectedIds: [] },
            office: { defaultHours: 2.5, selectedIds: [] },
            cost: { defaultHours: 2.5, selectedIds: [] }
          });

          const formatThaiDate = (dateStr) => {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            return `${parseInt(day, 10)}/${parseInt(month, 10)}/${parseInt(year, 10) + 543}`;
          };

          useEffect(() => {
            if (status && status.type === 'success') {
              const timer = setTimeout(() => setStatus(null), 4000);
              return () => clearTimeout(timer);
            }
          }, [status]);

          const fetchData = async () => {
            setLoading(true);
            setStatus(null);
            try {
              const text = await fetchWithFallback(csvUrl);
              const rows = text.replace(/\r/g, '').split('\n')
                .filter(r => r.trim())
                .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                .map(cell => cell.trim().replace(/"/g, '')));
              
              if (rows.length < 2) throw new Error("ไม่พบข้อมูลพนักงานในชีต");
              
              const headers = rows[0];
              const thaiDateStr = formatThaiDate(targetDate);
              const dateColIdx = headers.indexOf(thaiDateStr);

              const getColIndex = (keywords) => headers.findIndex(h => keywords.some(k => h.toLowerCase().includes(k.toLowerCase())));
              
              let idIdx = getColIndex(["รหัส", "id", "工号"]);
              if (idIdx === -1) idIdx = 0;
              
              let nameIdx = getColIndex(["ชื่อ", "name", "姓名"]);
              if (nameIdx === -1) nameIdx = 1;
              
              let lineIdx = getColIndex(["ไลน์", "line", "线"]);
              if (lineIdx === -1) lineIdx = 2;
              
              let groupIdx = getColIndex(["กลุ่ม", "section", "group", "แผนก"]);
              if (groupIdx === -1) groupIdx = 3;

              const newSavedIds = new Set();
              const allEmps = rows.slice(1).map(row => {
                const eid = row[idIdx] || '';
                if (dateColIdx !== -1 && row[dateColIdx] && parseFloat(row[dateColIdx]) > 0) {
                  newSavedIds.add(eid);
                }
                return {
                  id: eid,
                  name: row[nameIdx] || '',
                  line: row[lineIdx] || '',
                  group: row[groupIdx] || ''
                };
              }).filter(e => e.id);

              setEmployees(allEmps);
              setSavedIds(newSavedIds);
            } catch (err) {
              setStatus({ type: 'error', msg: err.message });
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => { fetchData(); }, [targetDate]);

          const filteredActiveEmployees = useMemo(() => {
              return employees.filter(emp => {
                  if (globalEmployees && globalEmployees.length > 0) {
                      const gEmp = globalEmployees.find(ge => String(ge.id) === String(emp.id));
                      if (gEmp) {
                          if (gEmp.resignedDate && new Date(targetDate) >= new Date(gEmp.resignedDate)) {
                              return false;
                          }
                          const status = gEmp.statusesByDate?.[targetDate] || 'ไม่มีข้อมูล';
                          if (status.includes('ขาด') || status.includes('ลา')) {
                              return false;
                          }
                          // กรองพนักงานตามกะการทำงาน (Shift) ที่เลือกในหน้า OT
                          if (gEmp.shift !== shift) {
                              return false;
                          }
                      }
                  }
                  return true;
              });
          }, [employees, globalEmployees, targetDate, shift]);

          const productionEmps = useMemo(() => {
            return filteredActiveEmployees.filter(emp => {
              const cleanLine = emp.line.toString().replace(/[^0-9]/g, '');
              return cleanLine === selectedLine.toString();
            });
          }, [filteredActiveEmployees, selectedLine]);

          const handleToggleSelect = (groupId, userId) => {
            if (savedIds.has(userId)) return;
            setGroupState(prev => {
              const current = prev[groupId].selectedIds;
              const next = current.includes(userId) ? current.filter(id => id !== userId) : [...current, userId];
              return { ...prev, [groupId]: { ...prev[groupId], selectedIds: next } };
            });
          };

          const requestSaveGroup = (groupId, groupName) => {
             const count = groupState[groupId].selectedIds.length;
             if(count > 0) {
                 setConfirmDialog({ isOpen: true, groupId, groupName });
             }
          };

          const handleSaveGroupConfirmed = async () => {
            const groupId = confirmDialog.groupId;
            const groupName = confirmDialog.groupName;
            const settings = groupState[groupId];
            
            setConfirmDialog({ isOpen: false, groupId: null, groupName: '' });
            if (settings.selectedIds.length === 0) return;
            
            setSaving(true);
            setStatus(null);
            
            const payload = settings.selectedIds.map(id => {
              const emp = employees.find(e => e.id === id);
              return {
                date: formatThaiDate(targetDate),
                shift: shift,
                line: selectedLine,
                id: id,
                name: emp?.name || '',
                groupName: emp?.group || groupName,
                hours: settings.defaultHours
              };
            });

            try {
              await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
              });
              
              const newSaved = new Set(savedIds);
              settings.selectedIds.forEach(id => newSaved.add(id));
              setSavedIds(newSaved);
              
              setStatus({ type: 'success', msg: `บันทึกกลุ่ม ${groupName} (${payload.length} คน) เรียบร้อย` });
              setGroupState(p => ({ ...p, [groupId]: { ...p[groupId], selectedIds: [] } }));
            } catch (e) {
              setStatus({ type: 'error', msg: "ไม่สามารถบันทึกข้อมูลได้ โปรดลองอีกครั้ง" });
            } finally {
              setSaving(false);
            }
          };

          return (
            <div className="bg-slate-100 p-4 font-sans text-slate-700 animate-in fade-in duration-500 relative">
              <div className="max-w-[1440px] mx-auto bg-white rounded-[3rem] shadow-2xl p-6 md:p-10 border border-white">
                
                <div className="flex flex-col lg:flex-row justify-between mb-10 gap-8">
                  <div className="flex items-center gap-5">
                    <div className="bg-orange-600 p-4 rounded-[1.5rem] shadow-xl shadow-orange-200 transform hover:rotate-6 transition-transform">
                      <i className="fa-regular fa-clock text-white text-[32px]"></i>
                    </div>
                    <div>
                      <h1 className="text-2xl font-black italic tracking-tighter text-slate-800 uppercase leading-none">OT Dashboard V6.3</h1>
                      <div className="flex items-center gap-2 mt-3">
                        <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-sm"></div>
                        <p className="text-[10px] font-bold text-slate-400 uppercase italic tracking-widest text-emerald-600">Syncing with Grand Summary</p>
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-wrap items-center gap-4 w-full lg:w-auto">
                    {/* เพิ่มช่องค้นหาพนักงาน */}
                    <div className="flex items-center gap-3 bg-slate-50 p-2.5 rounded-2xl border border-slate-200 px-4 shadow-inner flex-1 min-w-[200px]">
                      <i className="fa-solid fa-search text-slate-400"></i>
                      <input 
                          type="text" 
                          placeholder="ค้นหารหัส หรือ ชื่อพนักงาน..." 
                          value={searchTerm} 
                          onChange={e => setSearchTerm(e.target.value)} 
                          className="bg-transparent border-none text-[13px] font-bold outline-none text-slate-800 w-full" 
                      />
                    </div>

                    <div className="flex items-center gap-3 bg-slate-50 p-2.5 rounded-2xl border border-slate-200 px-5 shadow-inner">
                      <i className="fa-regular fa-calendar text-orange-600 text-lg"></i>
                      <input type="date" value={targetDate} onChange={e => setTargetDate(e.target.value)} className="bg-transparent border-none text-[13px] font-black outline-none cursor-pointer text-slate-800" />
                    </div>

                    <div className="bg-slate-50 p-1.5 rounded-2xl flex border border-slate-200 shadow-inner">
                      {['Shift A', 'Shift B'].map(s => (
                        <button key={s} onClick={() => setShift(s)} className={`px-8 py-2.5 rounded-[1rem] text-[11px] font-black transition-all ${shift === s ? 'bg-white text-orange-600 shadow-md' : 'text-slate-400'}`}>{s}</button>
                      ))}
                    </div>

                    <div className="bg-slate-50 p-1.5 rounded-2xl flex gap-1.5 border border-slate-200 shadow-inner">
                      <span className="px-3 text-[10px] font-black text-slate-400 uppercase flex items-center italic">Line</span>
                      {[1, 2, 3, 4, 5].map(l => (
                        <button key={l} onClick={() => setSelectedLine(l)} className={`w-10 h-10 rounded-xl text-[13px] font-black transition-all border ${selectedLine === l ? 'bg-white text-orange-600 shadow-md border-orange-200 scale-110' : 'text-slate-400 border-transparent hover:bg-white/50'}`}>{l}</button>
                      ))}
                    </div>

                    <button onClick={fetchData} className="p-3.5 bg-white text-slate-400 hover:text-orange-600 rounded-2xl border shadow-sm active:scale-90 hover:border-orange-200"><i className={`fa-solid fa-arrows-rotate text-xl ${loading ? 'fa-spin' : ''}`}></i></button>
                  </div>
                </div>

                {status && (
                  <div className={`mb-10 p-5 rounded-[2rem] flex items-center gap-5 border shadow-sm animate-in slide-in-from-top-4 duration-500 ${status.type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-100' : 'bg-rose-50 text-rose-800 border-rose-100'}`}>
                    <div className={`p-2.5 rounded-full ${status.type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                      <i className={`fa-solid ${status.type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'} text-2xl`}></i>
                    </div>
                    <div>
                      <p className="text-[14px] font-black uppercase italic leading-none">สถานะ</p>
                      <p className="text-[11px] font-bold opacity-80 mt-1.5">{status.msg}</p>
                    </div>
                    <button onClick={() => setStatus(null)} className="ml-auto text-slate-400 p-2"><i className="fa-solid fa-xmark text-xl"></i></button>
                  </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                  {ORIGINAL_UI_GROUPS.map(group => {
                    const baseList = group.isGlobal ? filteredActiveEmployees : productionEmps;
                    
                    // เพิ่มการกรองด้วยคำค้นหา (SearchTerm)
                    const members = baseList.filter(u => {
                      const matchesGroup = group.keywords.some(k => u.group.toLowerCase().includes(k.toLowerCase()));
                      const matchesSearch = !searchTerm || u.id.toLowerCase().includes(searchTerm.toLowerCase()) || u.name.toLowerCase().includes(searchTerm.toLowerCase());
                      return matchesGroup && matchesSearch;
                    });

                    const settings = groupState[group.id];
                    const available = members.filter(m => !savedIds.has(m.id));
                    const isAllSelected = available.length > 0 && settings.selectedIds.length === available.length;
                    const totalHours = settings.selectedIds.length * settings.defaultHours;

                    return (
                      <div key={group.id} className="bg-white rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-[380px] overflow-hidden transition-all hover:shadow-md">
                        <div className="p-4 border-b flex items-center justify-between bg-slate-50/30">
                          <div>
                            <h3 className="text-sm font-black text-slate-800 leading-none">{group.name}</h3>
                            <span className="text-[9px] text-orange-500 font-bold uppercase tracking-wider">{group.sub}</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <div className="flex items-center bg-orange-100 border border-orange-200 rounded-xl px-2 py-1">
                              <span className="text-[9px] font-black mr-1 text-orange-700 italic">ชม.</span>
                              <input 
                                type="number" step="0.5" value={settings.defaultHours} 
                                onChange={e => setGroupState(p => ({...p, [group.id]: {...p[group.id], defaultHours: parseFloat(e.target.value) || 0}}))}
                                className="w-8 text-center font-bold text-[11px] bg-transparent outline-none text-slate-800" 
                              />
                            </div>
                            <button 
                              onClick={() => requestSaveGroup(group.id, group.name)} 
                              disabled={settings.selectedIds.length === 0 || saving}
                              className="bg-orange-600 hover:bg-orange-700 text-white text-[10px] font-black px-4 py-2 rounded-xl shadow-sm active:scale-95 transition-all disabled:opacity-20"
                            >
                              {saving ? <i className="fa-solid fa-circle-notch fa-spin"></i> : "บันทึก"}
                            </button>
                          </div>
                        </div>

                        <div className="bg-slate-50/50 px-4 py-2 flex items-center justify-between text-[10px] border-b">
                           <div className="flex items-center gap-2">
                             <button onClick={() => {
                               const next = isAllSelected ? [] : available.map(m => m.id);
                               setGroupState(p => ({...p, [group.id]: {...p[group.id], defaultHours: p[group.id].defaultHours, selectedIds: next}}));
                             }}>
                               <i className={`fa-solid ${isAllSelected ? 'fa-square-check text-orange-600' : 'fa-square text-slate-300'} text-base`}></i>
                             </button>
                             <span className="font-bold text-slate-400 italic uppercase">ID / Employee Name</span>
                           </div>
                           <div className="text-orange-600 font-black bg-white px-2 py-0.5 rounded-lg border border-orange-100 shadow-sm">
                             {totalHours.toFixed(1)} hrs
                           </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-2 custom-scrollbar bg-white">
                          {members.length > 0 ? (
                            members.map(m => {
                              const isSaved = savedIds.has(m.id);
                              const isSelected = settings.selectedIds.includes(m.id);
                              
                              // ดึงข้อมูล OT ที่ถูกบันทึกไปแล้ว จากข้อมูล global
                              const globalEmpInfo = globalEmployees?.find(ge => String(ge.id) === String(m.id));
                              const existingOTVal = globalEmpInfo?.otByDate?.[targetDate];
                              const hasExistingOT = parseFloat(existingOTVal) > 0;

                              return (
                                <div 
                                  key={m.id} 
                                  onClick={() => !isSaved && handleToggleSelect(group.id, m.id)} 
                                  className={`flex items-center p-2.5 rounded-xl border-b border-slate-50 transition-all ${isSaved ? 'opacity-40 bg-slate-50' : 'cursor-pointer hover:bg-slate-50'} ${isSelected ? 'bg-orange-50/40' : ''}`}
                                >
                                  <div className="w-[10%] flex justify-center">
                                    <i className={`fa-solid ${isSaved ? 'fa-lock text-slate-400 text-xs' : isSelected ? 'fa-square-check text-orange-600 text-base' : 'fa-square text-slate-200 text-base'}`}></i>
                                  </div>
                                  <div className="w-[70%] px-2">
                                    <div className="text-[11px] font-black text-slate-800 leading-none flex items-center">
                                        {m.id}
                                        {/* แสดงป้ายชั่วโมง OT ถ้ามี */}
                                        {hasExistingOT && !isSaved && (
                                            <span className="ml-2 px-1.5 py-0.5 rounded text-[9px] bg-blue-50 text-blue-600 border border-blue-100 shadow-sm flex items-center gap-1">
                                                <i className="fa-solid fa-clock"></i> {existingOTVal} ชม.
                                            </span>
                                        )}
                                    </div>
                                    <div className="text-[10px] text-slate-500 truncate mt-1">{m.name}</div>
                                  </div>
                                  <div className="w-[20%] text-right">
                                    {isSaved && <span className="text-[8px] font-black text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded uppercase border border-emerald-100 flex items-center justify-center gap-1"><i className="fa-solid fa-check"></i> SAVED</span>}
                                  </div>
                                </div>
                              );
                            })
                          ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 italic py-10">
                              <i className="fa-solid fa-users text-2xl mb-2"></i>
                              <p className="text-[10px] uppercase font-black">{searchTerm ? "ไม่พบผลการค้นหา" : "ไม่พบพนักงาน"}</p>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Confirm Dialog Modal */}
                {confirmDialog.isOpen && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                        <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95 duration-200 border border-slate-100">
                            <div className="bg-orange-50 p-6 text-center border-b border-orange-100">
                                <div className="w-16 h-16 bg-white text-orange-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm">
                                    <i className="fa-solid fa-file-signature"></i>
                                </div>
                                <h3 className="text-xl font-black text-slate-800">ยืนยันการบันทึก OT</h3>
                            </div>
                            <div className="p-6">
                                <p className="text-slate-600 text-[13px] font-bold text-center mb-6 leading-relaxed">
                                    คุณต้องการบันทึกข้อมูลล่วงเวลา (OT) ให้กับกลุ่ม <span className="text-orange-600 font-black">{confirmDialog.groupName}</span> ใช่หรือไม่?
                                </p>
                                <div className="bg-slate-50 rounded-xl p-4 space-y-3 mb-8 border border-slate-100">
                                    <div className="flex justify-between items-center text-[12px]">
                                        <span className="font-bold text-slate-500">จำนวนพนักงาน</span>
                                        <span className="font-black text-slate-800">{groupState[confirmDialog.groupId].selectedIds.length} คน</span>
                                    </div>
                                    <div className="flex justify-between items-center text-[12px]">
                                        <span className="font-bold text-slate-500">ชั่วโมง OT / คน</span>
                                        <span className="font-black text-orange-600">{groupState[confirmDialog.groupId].defaultHours} ชม.</span>
                                    </div>
                                    <div className="border-t border-slate-200 pt-3 flex justify-between items-center text-[12px]">
                                        <span className="font-bold text-slate-500">วันที่ทำรายการ</span>
                                        <span className="font-black text-slate-800">{formatThaiDate(targetDate)}</span>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setConfirmDialog({ isOpen: false, groupId: null, groupName: '' })} 
                                        className="flex-1 bg-white text-slate-500 border border-slate-200 py-3 rounded-[1rem] font-black hover:bg-slate-50 transition-colors"
                                    >
                                        ยกเลิก
                                    </button>
                                    <button 
                                        onClick={handleSaveGroupConfirmed} 
                                        className="flex-1 bg-orange-600 text-white py-3 rounded-[1rem] font-black hover:bg-orange-700 shadow-md shadow-orange-200 transition-all flex items-center justify-center gap-2"
                                    >
                                        <i className="fa-solid fa-check"></i> ยืนยันบันทึก
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

              </div>
            </div>
          );
        };

        // ============================================================================
        // [ ส่วนจัดการระบบ (Main App Router) ]
        // ============================================================================
        const MainApp = () => {
            const [view, setView] = useState('dashboard');
            const [employees, setEmployees] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedLine, setSelectedLine] = useState('LINE 2');
            const [activeShift, setActiveShift] = useState('Shift A');
            const [otPass, setOtPass] = useState('');
            const [isOtAuth, setIsOtAuth] = useState(false);
            
            const SHEET_ID = '1R3-R-HsrfGBt1L2wMFrsIBZnCz20YNRhVTWnb4Ygxto';
            const fetchInterval = useRef(null);

            // Timeout สำหรับออกจากระบบ OT อัตโนมัติใน 2 นาที
            useEffect(() => {
                let authTimeout;
                if (isOtAuth) {
                    authTimeout = setTimeout(() => {
                        setIsOtAuth(false);
                        setOtPass('');
                    }, 120000); // 120000 ms = 2 นาที
                }
                return () => {
                    if (authTimeout) clearTimeout(authTimeout);
                };
            }, [isOtAuth]);

            const fetchDashboardData = async (isSilent = false) => {
                if (!isSilent) setLoading(true);
                try {
                    const GID_ATTENDANCE = "505123189";
                    const CSV_ATT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_ATTENDANCE}`;
                    
                    const textAtt = await fetchWithFallback(CSV_ATT_URL);
                    const rowsAtt = textAtt.replace(/\r/g, '').split('\n')
                        .filter(r => r.trim())
                        .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, '')));
                    
                    const headersAtt = rowsAtt[0];

                    const CSV_OT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Grand_Summary`;
                    const textOT = await fetchWithFallback(CSV_OT_URL);
                    const rowsOT = textOT.replace(/\r/g, '').split('\n')
                        .filter(r => r.trim())
                        .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, '')));
                    
                    const headersOT = rowsOT[0];

                    const parseHeaderToYMD = (h) => {
                        const trimmed = h.trim();
                        const match = trimmed.match(/(\d{1,4})[-/.](\d{1,2})[-/.](\d{1,4})/);
                        if (!match) return null;
                        let num1 = parseInt(match[1], 10), num2 = parseInt(match[2], 10), num3 = parseInt(match[3], 10);
                        let y, m, d;
                        if (num1 > 1000) { y = num1; m = num2; d = num3; }
                        else if (num3 > 1000) {
                            y = num3;
                            if (num1 > 12) { d = num1; m = num2; }
                            else if (num2 > 12) { m = num1; d = num2; }
                            else { m = num1; d = num2; }
                        } else {
                            y = num3 + 2000;
                            if (num1 > 12) { d = num1; m = num2; }
                            else { m = num1; d = num2; }
                        }
                        if (y > 2500) y -= 543;
                        return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    };

                    const parseOTHeaderToYMD = (h) => {
                        const trimmed = String(h).trim();
                        if (!trimmed) return null;
                        
                        // 1. อ่านรูปแบบตัวเลขปกติ (เช่น 18/04/2026 หรือ 18-4-69)
                        const match = trimmed.match(/(\d{1,4})[-/.](\d{1,2})[-/.](\d{1,4})/);
                        if (match) {
                            let num1 = parseInt(match[1], 10), num2 = parseInt(match[2], 10), num3 = parseInt(match[3], 10);
                            let y, m, d;
                            if (num1 > 1000) { y = num1; m = num2; d = num3; }
                            else if (num3 > 1000) {
                                y = num3;
                                if (num2 > 12) { m = num1; d = num2; } 
                                else { d = num1; m = num2; }
                            } else {
                                y = num3 + 2000;
                                if (num2 > 12) { m = num1; d = num2; }
                                else { d = num1; m = num2; }
                            }
                            if (y > 2500) y -= 543;
                            return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        }
                        
                        // 2. รองรับกรณีพิมพ์วันที่เป็นเดือนภาษาไทย (เช่น "18 เม.ย. 2569" หรือ "18 เมษายน 2026")
                        const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค.", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                        for (let i = 0; i < thaiMonths.length; i++) {
                            if (trimmed.includes(thaiMonths[i])) {
                                const m = (i % 12) + 1;
                                const dMatch = trimmed.match(/\d{1,2}/);
                                const yMatch = trimmed.match(/\d{4}/);
                                if (dMatch && yMatch) {
                                    let y = parseInt(yMatch[0], 10);
                                    if (y > 2500) y -= 543;
                                    const d = parseInt(dMatch[0], 10);
                                    return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                }
                            }
                        }
                        
                        // 3. รองรับกรณี Sheet คืนค่ามาเป็นตัวอักษรภาษาอังกฤษ เช่น "18-Apr" หรือ "18 Apr 2026"
                        const dObj = new Date(trimmed);
                        if (!isNaN(dObj.getTime()) && trimmed.match(/[a-zA-Z]/)) {
                             let y = dObj.getFullYear();
                             if (y > 2500) y -= 543;
                             return `${y}-${String(dObj.getMonth() + 1).padStart(2, '0')}-${String(dObj.getDate()).padStart(2, '0')}`;
                        }
                        return null;
                    };

                    const attDateCols = [];
                    headersAtt.forEach((h, idx) => {
                        const ymd = parseHeaderToYMD(h);
                        if (ymd) attDateCols.push({ idx, ymd });
                    });

                    // [OT FIX] ระบบตรวจสอบรูปแบบข้อมูล (Flat Log vs Pivot Table) เพื่อดึงโอทีให้แม่นยำที่สุด
                    let otHeaderRowIdx = 0;
                    let idIdxOT = -1;
                    let dateIdxOT = -1;
                    let hoursIdxOT = -1;
                    
                    for (let i = 0; i < Math.min(5, rowsOT.length); i++) {
                        const hRow = rowsOT[i].map(h => String(h).toLowerCase());
                        const tempIdx = hRow.findIndex(h => ["รหัส", "id", "工号", "emp"].some(k => h.includes(k)));
                        if (tempIdx !== -1) {
                            otHeaderRowIdx = i;
                            idIdxOT = tempIdx;
                            dateIdxOT = hRow.findIndex(h => ["วัน", "date", "เวลา"].some(k => h.includes(k)));
                            hoursIdxOT = hRow.findIndex(h => ["ชั่วโมง", "ot", "hour", "ชม"].some(k => h.includes(k)));
                            break;
                        }
                    }

                    const otMap = {};
                    if (idIdxOT !== -1) {
                        if (dateIdxOT !== -1 && hoursIdxOT !== -1) {
                            // 1. รูปแบบ Flat Log (ข้อมูลเรียงต่อกันเป็นบรรทัดๆ เช่น Date | ID | OT)
                            rowsOT.slice(otHeaderRowIdx + 1).forEach(r => {
                                const eid = r[idIdxOT] ? String(r[idIdxOT]).trim() : '';
                                const rawDate = r[dateIdxOT] ? String(r[dateIdxOT]).trim() : '';
                                const rawHours = r[hoursIdxOT] ? String(r[hoursIdxOT]).trim() : '';
                                
                                if (!eid || !rawDate) return;
                                
                                const ymd = parseOTHeaderToYMD(rawDate);
                                if (ymd) {
                                    if (!otMap[eid]) otMap[eid] = {};
                                    // หากมีข้อมูลพนักงานคนเดียวกันลงหลายบรรทัดใน 1 วัน ระบบจะบวกชั่วโมงเพิ่มให้
                                    const currentVal = parseFloat(otMap[eid][ymd]) || 0;
                                    const addVal = parseFloat(rawHours) || 0;
                                    otMap[eid][ymd] = (currentVal + addVal).toString();
                                }
                            });
                        } else {
                            // 2. รูปแบบ Pivot Table (วันที่อยู่ตามหัวตาราง เช่น ID | 18/4 | 19/4)
                            const otDateCols = [];
                            const maxCols = Math.max(...rowsOT.slice(0, 5).map(r => r.length));
                            for (let colIdx = 0; colIdx < maxCols; colIdx++) {
                                if (colIdx === idIdxOT) continue;
                                let foundDateYMD = null;
                                for (let rowIdx = 0; rowIdx < Math.min(5, rowsOT.length); rowIdx++) {
                                    if (rowsOT[rowIdx] && rowsOT[rowIdx][colIdx]) {
                                        const ymd = parseOTHeaderToYMD(rowsOT[rowIdx][colIdx]);
                                        if (ymd) {
                                            foundDateYMD = ymd;
                                            break;
                                        }
                                    }
                                }
                                if (foundDateYMD) {
                                    otDateCols.push({ idx: colIdx, ymd: foundDateYMD });
                                }
                            }

                            rowsOT.slice(otHeaderRowIdx + 1).forEach(r => {
                                const eid = r[idIdxOT] ? String(r[idIdxOT]).trim() : '';
                                if (!eid) return;
                                if (!otMap[eid]) otMap[eid] = {};
                                otDateCols.forEach(col => {
                                    const val = r[col.idx] ? String(r[col.idx]).trim() : '0';
                                    if (val !== '0' && val !== '' && val !== '-') {
                                        otMap[eid][col.ymd] = val;
                                    }
                                });
                            });
                        }
                    }
                    
                    const getColIndex = (headers, keywords) => headers.findIndex(h => keywords.some(k => h.toLowerCase().includes(k.toLowerCase())));
                    
                    let idIdx = getColIndex(headersAtt, ["รหัส", "id", "工号"]);
                    if (idIdx === -1) idIdx = 0;
                    
                    let nameIdx = getColIndex(headersAtt, ["ชื่อ", "name", "姓名"]);
                    if (nameIdx === -1) nameIdx = 1;
                    
                    let lineIdx = getColIndex(headersAtt, ["ไลน์", "line", "线"]);
                    if (lineIdx === -1) lineIdx = 2;
                    
                    let groupIdx = getColIndex(headersAtt, ["กลุ่ม", "section", "group", "แผนก"]);
                    if (groupIdx === -1) groupIdx = 3;
                    
                    let roleIdx = getColIndex(headersAtt, ["ตำแหน่ง", "role", "ระดับ", "หน้าที่"]);
                    if (roleIdx === -1) roleIdx = 5;
                    
                    let isKeyIdx = getColIndex(headersAtt, ["iskey", "key", "สำคัญ"]);

                    const emps = rowsAtt.slice(1).map(r => {
                        const eid = r[idIdx] ? String(r[idIdx]).trim() : '';
                        const statusesByDate = {};
                        const shiftsByDate = {}; // เก็บข้อมูลกะรายวัน
                        let firstResignedDate = null;
                        
                        const sortedAttDateCols = [...attDateCols].sort((a,b) => new Date(a.ymd) - new Date(b.ymd));

                        sortedAttDateCols.forEach(col => {
                            const cellStatus = r[col.idx] ? String(r[col.idx]).trim() : '';
                            let fStatus = 'ไม่มีข้อมูล';
                            let dShift = 'ไม่มีข้อมูล'; // เก็บกะประจำวันของวันนั้น
                            
                            if (cellStatus !== '' && cellStatus !== '-') {
                                const sStatus = cellStatus.toLowerCase();
                                
                                // ระบบตรวจสอบและแยกแยะกะ (A/B) จากข้อความสถานะรายวัน
                                if (sStatus.includes('day') || sStatus.includes('เช้า') || sStatus.includes('a-') || sStatus.startsWith('a')) {
                                    dShift = 'Shift A';
                                } else if (sStatus.includes('night') || sStatus.includes('ดึก') || sStatus.includes('b-') || sStatus.startsWith('b')) {
                                    dShift = 'Shift B';
                                }

                                if (sStatus.includes('ขาด') || sStatus.includes('absent')) fStatus = 'ขาดงาน';
                                else if (sStatus.includes('ป่วย') || sStatus.includes('sick')) fStatus = 'ลาป่วย';
                                else if (sStatus.includes('กิจ') || sStatus.includes('personal')) fStatus = 'ลากิจ';
                                else if (sStatus.includes('พักร้อน') || sStatus.includes('vacation')) fStatus = 'ลาพักร้อน';
                                else if (sStatus.includes('สาย') || sStatus.includes('late')) fStatus = 'สาย';
                                else if (sStatus.includes('ออก') || sStatus.includes('resigned')) fStatus = 'ลาออก';
                                else if (sStatus.includes('อื่น') || sStatus.includes('other')) fStatus = 'ลาอื่นๆ';
                                else if (sStatus.includes('ปกติ') || sStatus.includes('present') || !isNaN(cellStatus) || sStatus === 'p') fStatus = 'มาปกติ';
                                else fStatus = 'มาปกติ';
                            }
                            
                            if (fStatus === 'ลาออก' && !firstResignedDate) {
                                firstResignedDate = col.ymd;
                            }
                            
                            statusesByDate[col.ymd] = fStatus;
                            shiftsByDate[col.ymd] = dShift; // บันทึกกะลงตารางรายวัน
                        });

                        let groupVal = r[groupIdx] ? String(r[groupIdx]).trim() : '';
                        const sGroup = groupVal.toLowerCase();
                        if (sGroup.includes('前装') || sGroup.includes('front') || sGroup.includes('input') || sGroup.includes('หัวไลน์')) groupVal = 'หัวไลน์';
                        else if (sGroup.includes('装配') || sGroup.includes('middle') || sGroup.includes('กลางไลน์')) groupVal = 'กลางไลน์';
                        else if (sGroup.includes('测试') || sGroup.includes('cooling') || sGroup.includes('testing') || sGroup.includes('test') || sGroup.includes('ห้องทดสอบ')) groupVal = 'ห้องทดสอบ';
                        else if (sGroup.includes('后装') || sGroup.includes('final') || sGroup.includes('end') || sGroup.includes('ท้ายไลน์')) groupVal = 'ท้ายไลน์';

                        const fullRowStr = r.join(' ').toLowerCase();
                        const keyVal = isKeyIdx !== -1 && r[isKeyIdx] ? String(r[isKeyIdx]).trim() : '';

                        const shiftCell = r[6] ? String(r[6]).trim().toUpperCase() : '';
                        let empShift = 'Shift A';
                        if (shiftCell === 'B' || shiftCell.includes('SHIFT B') || shiftCell.includes('กะ B') || shiftCell.includes('NIGHT') || shiftCell === 'N') {
                            empShift = 'Shift B';
                        } else if (shiftCell === 'A' || shiftCell.includes('SHIFT A') || shiftCell.includes('กะ A') || shiftCell.includes('DAY') || shiftCell === 'D') {
                            empShift = 'Shift A';
                        }

                        return {
                            id: eid,
                            name: r[nameIdx] ? String(r[nameIdx]).trim() : '',
                            line: r[lineIdx] ? String(r[lineIdx]).trim() : '',
                            group: groupVal,
                            role: r[roleIdx] ? String(r[roleIdx]).trim() : '',
                            isKey: keyVal,
                            shift: empShift,
                            fullRowStr: fullRowStr,
                            status: 'ไม่มีข้อมูล',
                            statusesByDate: statusesByDate,
                            shiftsByDate: shiftsByDate, // เพิ่มข้อมูลประวัติกะรายวัน
                            otByDate: otMap[eid] || {},
                            resignedDate: firstResignedDate
                        };
                    }).filter(e => e.id !== '');
                    
                    setEmployees(emps);
                } catch (e) { 
                    console.warn("Data sync skipped or failed:", e.message); 
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                fetchDashboardData();
                fetchInterval.current = setInterval(() => {
                    fetchDashboardData(true);
                }, 30000);
                return () => { if (fetchInterval.current) clearInterval(fetchInterval.current); };
            }, [view]);

            const handleOTClick = () => {
                setOtPass('');
                setView('ot');
            };

            const checkPass = () => {
                if (otPass === OT_ACCESS_PASSWORD) {
                    setIsOtAuth(true);
                } else {
                    alert('รหัสผ่านไม่ถูกต้อง');
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="glass-nav border-b sticky top-0 z-50 flex flex-wrap xl:flex-nowrap items-center justify-between px-4 lg:px-6 py-3 xl:py-0 xl:h-16 gap-y-3 shadow-sm">
                        <div className="flex items-center gap-3 shrink-0">
                            <div className="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100"><i className="fa-solid fa-industry text-base"></i></div>
                            <div>
                                <h1 className="text-base font-black italic uppercase text-slate-800 tracking-tighter leading-none">Haier A01 Suite</h1>
                                <p className="text-[9px] font-black text-slate-400 tracking-widest uppercase mt-0.5">Production Management</p>
                            </div>
                        </div>

                        <div className="flex items-center justify-center gap-2 order-last xl:order-none w-full xl:w-auto overflow-x-auto pb-1 xl:pb-0 hide-scrollbar shrink-0">
                            {[
                                { id: 'dashboard', l: 'หน้าหลัก', i: 'fa-chart-pie', act: () => setView('dashboard') },
                                { id: 'attendance', l: 'เช็คเวลา', i: 'fa-user-check', act: () => setView('attendance') },
                                { id: 'ot', l: 'บันทึก OT', i: 'fa-clock', act: handleOTClick }
                            ].map(t => (
                                <button key={t.id} onClick={t.act} className={`whitespace-nowrap shrink-0 px-4 py-2 rounded-xl text-[12px] font-bold flex items-center gap-2 transition-all border ${view===t.id ? 'bg-blue-50 text-blue-600 border-blue-100 shadow-sm' : 'text-slate-500 hover:bg-slate-50 border-transparent hover:border-slate-200'}`}>
                                    <i className={`fa-solid ${t.i}`}></i> <span className="uppercase">{t.l}</span>
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-2 sm:gap-3 xl:border-l xl:border-slate-200 xl:pl-6 shrink-0 ml-auto overflow-x-auto hide-scrollbar pb-1 xl:pb-0">
                            <div className="flex bg-slate-100 p-1 rounded-full border border-slate-200 shrink-0">
                                {['Shift A', 'Shift B'].map(s => (
                                    <button key={s} onClick={()=>setActiveShift(s)} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[10px] font-black transition-all ${activeShift===s?'bg-white text-blue-600 shadow-sm':'text-slate-400 hover:text-slate-600'}`}>
                                        {s}
                                    </button>
                                ))}
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 shrink-0">
                                {['ALL', 'LINE 1', 'LINE 2', 'LINE 3', 'LINE 4', 'LINE 5'].map(l => (
                                    <button key={l} onClick={()=>setSelectedLine(l)} className={`whitespace-nowrap px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${selectedLine===l?'bg-white text-blue-600 shadow-sm':'text-slate-400 hover:text-slate-600'}`}>{l}</button>
                                ))}
                            </div>
                            {view !== 'ot' && (
                                <button onClick={() => fetchDashboardData()} className="shrink-0 w-9 h-9 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-slate-400 hover:text-blue-600 transition-colors shadow-sm active:scale-95"><i className={`fa-solid fa-arrows-rotate text-sm ${loading?'fa-spin':''}`}></i></button>
                            )}
                        </div>
                    </nav>

                    <main className="flex-1 w-full bg-slate-50">
                        {view === 'dashboard' && <div className="max-w-[1440px] mx-auto p-8 w-full"><DashboardView employees={employees} selectedLine={selectedLine} activeShift={activeShift} isSyncing={loading} /></div>}
                        {view === 'attendance' && <div className="max-w-[1440px] mx-auto p-8 w-full"><AttendanceView employees={employees} /></div>}
                        
                        {view === 'ot' && (
                            !isOtAuth ? (
                                <div className="max-w-md mx-auto mt-20 p-10 bg-white rounded-[2.5rem] shadow-xl border border-slate-100 text-center animate-in zoom-in-95 duration-300">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6">
                                        <i className="fa-solid fa-lock"></i>
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-800 mb-2">พื้นที่หวงห้าม</h2>
                                    <p className="text-slate-400 text-sm mb-8 font-bold">กรุณากรอกรหัสผ่านเพื่อบันทึก OT</p>
                                    
                                    <input 
                                        type="password" 
                                        value={otPass} 
                                        onChange={(e) => setOtPass(e.target.value)} 
                                        onKeyDown={(e) => e.key === 'Enter' && checkPass()} 
                                        placeholder="ระบุรหัสผ่าน (Password)" 
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-black text-slate-700 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:bg-white transition-all text-center tracking-[0.5em]"
                                        autoFocus
                                    />
                                    
                                    <button 
                                        onClick={checkPass} 
                                        className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95 flex items-center justify-center gap-2"
                                    >
                                        <i className="fa-solid fa-key"></i> ปลดล็อคระบบ
                                    </button>
                                </div>
                            ) : (
                                <OriginalOTSystem globalEmployees={employees} />
                            )
                        )}
                    </main>

                    {view !== 'ot' && (
                        <footer className="py-8 text-center border-t bg-white">
                            <div className="flex items-center justify-center gap-6 text-[9px] font-black text-slate-300 italic uppercase tracking-[0.25em]">
                                <span className="flex items-center gap-2"><i className="fa-solid fa-database text-blue-500"></i> HAIER PRODUCTION NETWORK A01</span>
                                <span>|</span>
                                <span>V6.4 STABLE RELEASE</span>
                                <span>|</span>
                                <span>VISUAL MAP MODE ACTIVE</span>
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
